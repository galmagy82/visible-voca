<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Kongko - Visual Voca</title>
<style>
  /* 공통 스타일 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 40px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 300;
    color: #888;
    margin-bottom: 24px;
    letter-spacing: 0.1em;
  }

  /* 메인 레이아웃: 왼쪽 탭 + 오른쪽 컨텐츠 */
  .main-layout {
    display: flex;
    width: 100%;
    max-width: 860px;
    gap: 0;
  }

  /* 왼쪽 탭 사이드바 */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 100px;
    padding-top: 4px;
  }
  .sidebar .tab {
    padding: 12px 16px;
    font-size: 0.85rem;
    color: #666;
    background: transparent;
    border: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: color 0.2s, font-weight 0.2s;
    white-space: nowrap;
  }
  .sidebar .tab:hover { color: #aaa; }
  .sidebar .tab.active {
    color: #e0e0e0;
    font-weight: 600;
  }

  /* 오른쪽 컨텐츠 영역 */
  .content {
    flex: 1;
    padding-left: 24px;
    border-left: 1px solid #222;
    min-height: 60vh;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 검색창 */

    gap: 8px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 32px;
  }
  .search-box input {

    color: #fff;

  }
  .search-box input:focus { border-color: #555; }
  .search-box input::placeholder { color: #555; }
  button {
    padding: 14px 24px;
    font-size: 1rem;
    border: none;
    border-radius: 12px;
    background: #2a2a2a;
    color: #ccc;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #3a3a3a; }

  /* 가이드 영역 */

    background: #1a1a1a;

    margin-bottom: 6px;

<script>
// --- 발음 듣기 (브라우저 TTS) ---
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// --- 탭 전환 ---
function switchTab(tab) {
  /* 사이드바 탭 활성화 */
  document.querySelectorAll('.sidebar .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const map = { search: 0, photo: 1, wordbook: 2, quiz: 3 };
  document.querySelectorAll('.sidebar .tab')[map[tab]].classList.add('active');
  const panels = { search: 'tabSearch', photo: 'tabPhoto', wordbook: 'tabWordbook', quiz: 'tabQuiz' };
  document.getElementById(panels[tab]).classList.add('active');
}

// --- 설정 (localStorage 공유) ---
function getSettings() {
  const saved = localStorage.getItem('visibleVoca_settings');
  if (saved) return JSON.parse(saved);
  return { provider: 'gemini', apiKey: '' };
}

// --- 일반검색 ---
const input = document.getElementById('wordInput');
const resultSearch = document.getElementById('resultSearch');

/* 여러 단어 검색을 위한 상태 */
let wordList = [];
let currentWordIndex = 0;
let wordResults = {};

// --- 브라우저 캐시 (IndexedDB) ---
const DB_NAME = 'visualVoca';
const DB_VERSION = 2;
const STORE_NAME = 'resultCache';
const WB_STORE = 'wordbook';

/* IndexedDB 열기 */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
      if (!db.objectStoreNames.contains(WB_STORE)) {
        db.createObjectStore(WB_STORE, { keyPath: 'word' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

/* 캐시 저장 */
async function saveCacheEntry(word, html) {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(html, word);
  } catch (e) {
    console.warn('캐시 저장 실패:', e);
  }
}

/* 캐시 조회 */
async function getCacheEntry(word) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(word);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch {
    return null;
  }
}

/* 캐시 전체 삭제 */
async function clearCache() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).clear();
  } catch (e) {
    console.warn('캐시 삭제 실패:', e);
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') startLookup();
});

const PROMPT_TEMPLATE = `너는 한국어로만 대답하는 영어 단어 느낌 사전이야. 절대 영어로 사고하거나 영어 문장을 먼저 만들지 마. 처음부터 끝까지 한국어로 사고하고 한국어로 작성해.

"{{WORD}}"

위 영어 단어(또는 문장/표현)의 핵심 느낌을 설명해줘.

형식:
만약 입력에 문법 오류나 오타가 있다면, 첫 줄에 [CORRECTED: 올바른 표현] 형식으로 교정된 문장을 적어줘. 오류가 없으면 이 줄은 생략.
입력이 단어나 숙어인 경우, [POS: 품사] 형식으로 품사를 적어줘. 품사는 영어 약어로 적을 것 (noun, verb, adj, adv, phrase 등). 여러 품사가 가능하면 쉼표로 구분. 입력이 문장이면 이 줄은 생략.
1줄: 핵심 느낌을 큰따옴표로 감싸서 한 문장 요약. 예) "하나였던 것이 딱 갈라지는" 이미지예요.
2줄: 그 느낌을 바로 이해할 수 있는 비유나 장면 1~2문장.
---
3줄 이후: 자주 쓰이는 예시 2~3개. 영어 예문과 한국어 해석을 각각 한 줄씩 적되, "영어:", "한국어:" 같은 라벨 없이 바로 문장만 적을 것. 예문과 예문 사이에는 빈 줄 하나를 넣어서 구분할 것.

규칙:
- 반드시 한국어로만 설명할 것 ([CORRECTED: ...], [POS: ...] 안의 영어만 예외)
- 번역투 금지. 자연스러운 한국어 구어체로 작성
- 짧고 간결하게
- 마크다운 서식 쓰지 말 것
- 느낌 설명과 예시 사이에 반드시 --- 구분선을 넣을 것`;

// --- API 호출 ---
async function callGemini(apiKey, prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
    })
  });
  if (!res.ok) throw new Error('API 오류');
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text;
}

async function callChatGPT(apiKey, prompt) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.7,
      max_tokens: 2048
    })
  });
  if (!res.ok) throw new Error('API 오류');
  const data = await res.json();
  return data.choices?.[0]?.message?.content;
}

// --- 이미지 생성 ---
async function generateImageGemini(apiKey, word) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${apiKey}`;
  const imagePrompt = `Generate an image: Create an illustration that captures the feeling and mood of the English word "${word}". Use a concrete, recognizable scene or situation rather than abstract shapes, but keep it stylish and sophisticated — not cartoonish or childish. Think editorial illustration style with warm, natural colors and clean composition. Minimize unnecessary objects — only include objects essential to explaining the word. No text in the image.`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: imagePrompt }] }],
      generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
    })
  });
  if (!res.ok) throw new Error('이미지 생성 API 오류');
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  for (const part of parts) {
    if (part.inlineData) {
      return `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
    }
  }
  throw new Error('이미지 데이터를 찾을 수 없습니다.');
}

async function generateImageDalle(apiKey, word) {
  const imagePrompt = `Create an illustration that captures the feeling and mood of the English word "${word}". Use a concrete, recognizable scene or situation rather than abstract shapes, but keep it stylish and sophisticated — not cartoonish or childish. Think editorial illustration style with warm, natural colors and clean composition. No text in the image.`;
  const res = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'dall-e-3',
      prompt: imagePrompt,
      n: 1,
      size: '1024x1024',
      quality: 'standard'
    })
  });
  if (!res.ok) throw new Error('이미지 생성 API 오류');
  const data = await res.json();
  return data.data?.[0]?.url;
}

// --- 공통: 단어 검색 후 결과 HTML 생성 ---
async function fetchWordResult(word, targetEl) {
  /* 브라우저 캐시 확인 (IndexedDB) */
  const cached = await getCacheEntry(word);
  if (cached) {
    wordResults[word] = { html: cached };
    return cached;
  }

  const settings = getSettings();
  if (!settings.apiKey) {
    targetEl.innerHTML = '<div class="error">홈에서 설정 버튼을 눌러 API 키를 먼저 입력해주세요.</div>';
    return null;
  }

  targetEl.innerHTML = '<div class="loading">느낌을 찾는 중...</div>';

  const prompt = PROMPT_TEMPLATE.replace('{{WORD}}', word);

  const textPromise = settings.provider === 'gemini'
    ? callGemini(settings.apiKey, prompt)
    : callChatGPT(settings.apiKey, prompt);

  const imagePromise = settings.provider === 'gemini'
    ? generateImageGemini(settings.apiKey, word)
    : generateImageDalle(settings.apiKey, word);

  const text = await textPromise;
  if (!text) {
    targetEl.innerHTML = '<div class="error">응답을 받지 못했습니다.</div>';
    return null;
  }

  let corrected = '';
  let pos = '';
  let body = text;
  const corrMatch = text.match(/\[CORRECTED:\s*(.+?)\]/i);
  if (corrMatch) {
    corrected = corrMatch[1].trim();
    body = text.replace(/\[CORRECTED:\s*.+?\]\n?/i, '');
  }
  const posMatch = body.match(/\[POS:\s*(.+?)\]/i);
  if (posMatch) {
    pos = posMatch[1].trim();
    body = body.replace(/\[POS:\s*.+?\]\n?/i, '');
  }

  const parts = body.split(/\n---\n?/);
  const desc = parts[0].trim();
  const examples = parts.length > 1 ? parts[1].trim() : '';
  const speakWord = (corrected || word).replace(/'/g, "\\'");
  let html = `<div class="word-header">`;
  html += `<div class="word-title">${corrected || word}</div>`;
  html += `<button class="speak-btn" onclick="speak('${speakWord}')" title="발음 듣기">&#128264;</button>`;
  html += `</div>`;
  if (pos) html += `<div class="word-pos">${pos}</div>`;
  if (corrected) html += `<div class="corrected">${word} → <span>${corrected}</span></div>`;
  html += `<div class="feel-desc">${desc}</div>`;
  html += `<div class="feel-image-container" id="imageContainer"><div class="feel-image-loading">이미지 생성 중...</div></div>`;
  if (examples) html += `<div class="feel-examples">${examples}</div>`;
  /* 단어장에 추가 버튼 */
  html += `<button class="add-wordbook-btn" data-wb-word>+ 단어장에 추가</button>`;
  /* 렌더링 후 이벤트 바인딩을 위해 데이터 보관 */
  window._lastWbData = { word, pos, summary: desc.split('\n')[0].substring(0, 60) };

  wordResults[word] = { html };
  targetEl.innerHTML = html;
  bindWbButton(targetEl);

  /* 이미지 비동기 처리 — targetEl 내부에서 컨테이너를 찾음 */
  try {
    const imageUrl = await imagePromise;
    const container = targetEl.querySelector('.feel-image-container');
    if (container) {
      container.innerHTML = `<img src="${imageUrl}" alt="${word}의 느낌을 표현한 이미지">`;
    }
    const imgHtml = html.replace(
      '<div class="feel-image-loading">이미지 생성 중...</div>',
      `<img src="${imageUrl}" alt="${word}의 느낌을 표현한 이미지">`
    );
    wordResults[word] = { html: imgHtml };
    saveCacheEntry(word, imgHtml);
  } catch (imgErr) {
    console.error('이미지 생성 실패:', imgErr);
    const container = targetEl.querySelector('.feel-image-container');
    if (container) container.remove();
    const noImgHtml = html.replace(
      '<div class="feel-image-container" id="imageContainer"><div class="feel-image-loading">이미지 생성 중...</div></div>',
      ''
    );
    wordResults[word] = { html: noImgHtml };
    saveCacheEntry(word, noImgHtml);
  }

  return wordResults[word].html;
}

// --- 일반검색: 멀티 단어 ---
function startLookup() {
  const raw = input.value.trim();
  if (!raw) return;
  wordList = raw.split(',').map(w => w.trim().toLowerCase()).filter(w => w);
  if (wordList.length === 0) return;
  currentWordIndex = 0;
  wordResults = {};
  document.getElementById('guideSearch').style.display = 'none';
  lookupWord(wordList[currentWordIndex]);
}

function prevWord() {
  if (currentWordIndex > 0) {
    currentWordIndex--;
    showSearchResult(wordList[currentWordIndex]);
  }
}

function nextWord() {
  currentWordIndex++;
  if (currentWordIndex < wordList.length) {
    const word = wordList[currentWordIndex];
    if (wordResults[word]) {
      showSearchResult(word);
    } else {
      lookupWord(word);
    }
  }
}

function showSearchResult(word) {
  const cached = wordResults[word];
  if (!cached) return;
  resultSearch.innerHTML = cached.html + buildNavBar();
  bindWbButton(resultSearch, word);
}

async function lookupWord(word) {
  const cached = await getCacheEntry(word);
  if (cached) {
    wordResults[word] = { html: cached };
    showSearchResult(word);
    return;
  }

  try {
    await fetchWordResult(word, resultSearch);
    resultSearch.innerHTML = (wordResults[word]?.html || '') + buildNavBar();
    bindWbButton(resultSearch, word);
  } catch (err) {
    resultSearch.innerHTML = '<div class="error">API 오류가 발생했습니다. 홈에서 API 키를 확인해주세요.</div>';
  }
}

function buildNavBar() {
  if (wordList.length <= 1) return '';
  let html = `<div class="nav-bar">`;
  if (currentWordIndex > 0) {
    html += `<button class="nav-btn" onclick="prevWord()">Prev</button>`;
  }
  html += `<span class="progress">${currentWordIndex + 1} / ${wordList.length}</span>`;
  if (currentWordIndex < wordList.length - 1) {
    html += `<button class="nav-btn" onclick="nextWord()">Next</button>`;
  }
  html += `</div>`;
  return html;
}

function lookup() { startLookup(); }

// --- 사진에서 검색 ---
const resultPhoto = document.getElementById('resultPhoto');
const wordListEl = document.getElementById('wordList');
let photoWords = [];

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function extractWordsFromPhoto(apiKey, base64Data, mimeType) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const extractPrompt = `이 사진은 영어 소설(Novel)의 페이지를 찍은 것입니다.
사진에서 #표시, #표시와 동그라미, 또는 #표시와 밑줄로 표시된 영어 단어, 숙어, 또는 문장을 모두 찾아주세요.
결과는 쉼표로 구분하여 한 줄로 출력해주세요. 다른 설명 없이 추출된 단어/표현만 출력하세요.
예시: split, break down, take off`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          { text: extractPrompt },
          { inlineData: { mimeType: mimeType, data: base64Data } }
        ]
      }],
      generationConfig: { temperature: 0.2, maxOutputTokens: 1024 }
    })
  });
  if (!res.ok) throw new Error('사진 분석 API 오류');
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text;
}

/* 사진 업로드 처리 → 단어 리스트 표시 */
async function handlePhoto(inputEl) {
  const files = Array.from(inputEl.files);
  if (files.length === 0) return;

  const settings = getSettings();
  if (!settings.apiKey) {
    resultPhoto.innerHTML = '<div class="error">홈에서 설정 버튼을 눌러 API 키를 먼저 입력해주세요.</div>';
    inputEl.value = '';
    return;
  }

  document.getElementById('guidePhoto').style.display = 'none';
  wordListEl.innerHTML = '';
  resultPhoto.innerHTML = `<div class="loading">사진 ${files.length}장에서 단어를 추출하는 중...</div>`;

  try {
    const promises = files.map(async (file) => {
      const base64Data = await fileToBase64(file);
      return extractWordsFromPhoto(settings.apiKey, base64Data, file.type);
    });
    const results = await Promise.all(promises);

    const allWords = results.filter(r => r && r.trim()).join(', ');
    if (!allWords) {
      resultPhoto.innerHTML = '<div class="error">#표시된 단어를 찾지 못했습니다.</div>';
      inputEl.value = '';
      return;
    }

    /* 추출된 단어를 칩 리스트로 표시 */
    photoWords = allWords.split(',').map(w => w.trim().toLowerCase()).filter(w => w);
    wordResults = {};
    resultPhoto.innerHTML = '';

    wordListEl.innerHTML = photoWords.map((w, i) =>
      `<button class="word-chip" onclick="selectPhotoWord(${i})">${w}</button>`
    ).join('');

    inputEl.value = '';
  } catch (err) {
    console.error('사진 분석 실패:', err);
    resultPhoto.innerHTML = '<div class="error">사진 분석에 실패했습니다. 다시 시도해주세요.</div>';
    inputEl.value = '';
  }
}

/* 단어 칩 클릭 → 해당 단어 결과 표시 */
async function selectPhotoWord(index) {
  const word = photoWords[index];

  /* 활성 칩 표시 */
  document.querySelectorAll('.word-chip').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  /* 메모리 캐시 확인 */
  if (wordResults[word]) {
    resultPhoto.innerHTML = wordResults[word].html;
    bindWbButton(resultPhoto, word);
    return;
  }

  try {
    const cachedHtml = await fetchWordResult(word, resultPhoto);
    /* IndexedDB 캐시 히트 시 fetchWordResult가 렌더링하지 않으므로 직접 표시 */
    if (cachedHtml && wordResults[word]) {
      resultPhoto.innerHTML = wordResults[word].html;
    }
    bindWbButton(resultPhoto, word);
  } catch (err) {
    resultPhoto.innerHTML = '<div class="error">API 오류가 발생했습니다. 홈에서 API 키를 확인해주세요.</div>';
  }
}

// --- 단어장 ---
/* 단어장 추가 버튼 이벤트 바인딩 */
function bindWbButton(container, wordOverride) {
  const btn = container.querySelector('[data-wb-word]');
  if (!btn || btn._bound) return;
  btn._bound = true;
  /* wordOverride가 있으면 캐시에서 로드한 경우 — 최소 정보로 바인딩 */
  const data = wordOverride ? { word: wordOverride, pos: '', summary: '' } : window._lastWbData;
  if (!data) return;
  const { word, pos, summary } = data;
  btn.addEventListener('click', () => {
    addToWordbook(word, pos, summary, btn);
  });
}

/* 단어장에 추가 */
async function addToWordbook(word, pos, summary, btnEl) {
  try {
    const db = await openDB();
    const tx = db.transaction(WB_STORE, 'readwrite');
    const entry = {
      word: word,
      pos: pos || '',
      summary: summary || '',
      addedAt: Date.now()
    };
    tx.objectStore(WB_STORE).put(entry);
    if (btnEl) {
      btnEl.textContent = '단어장에 추가됨';
      btnEl.classList.add('added');
      btnEl.onclick = null;
    }
  } catch (e) {
    console.warn('단어장 추가 실패:', e);
  }
}

/* 단어장 전체 목록 조회 */
async function getWordbookAll() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(WB_STORE, 'readonly');
      const req = tx.objectStore(WB_STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  } catch {
    return [];
  }
}

/* 단어장에서 삭제 */
async function removeFromWordbook(word) {
  try {
    const db = await openDB();
    const tx = db.transaction(WB_STORE, 'readwrite');
    tx.objectStore(WB_STORE).delete(word);
  } catch (e) {
    console.warn('단어장 삭제 실패:', e);
  }
  renderWordbook();
}

/* 단어장 전체 삭제 */
async function clearWordbook() {
  if (!confirm('단어장을 전체 삭제하시겠습니까?')) return;
  try {
    const db = await openDB();
    const tx = db.transaction(WB_STORE, 'readwrite');
    tx.objectStore(WB_STORE).clear();
  } catch (e) {
    console.warn('단어장 전체 삭제 실패:', e);
  }
  document.getElementById('wordbookDetail').style.display = 'none';
  renderWordbook();
}

/* 단어장 목록 렌더링 */
async function renderWordbook() {
  const list = await getWordbookAll();
  const filter = (document.getElementById('wordbookFilter').value || '').toLowerCase();
  const sort = document.getElementById('wordbookSort').value;
  const listEl = document.getElementById('wordbookList');

  /* 필터 */
  let filtered = list.filter(item => item.word.toLowerCase().includes(filter));

  /* 정렬 */
  if (sort === 'alpha') {
    filtered.sort((a, b) => a.word.localeCompare(b.word));
  } else {
    filtered.sort((a, b) => b.addedAt - a.addedAt);
  }

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="wordbook-empty">저장된 단어가 없습니다.</div>';
    return;
  }

  listEl.innerHTML = filtered.map(item => {
    const safeWord = item.word.replace(/'/g, "\\'");
    return `<div class="wordbook-item" onclick="showWordbookDetail('${safeWord}', this)">
      <span class="wordbook-item-word">${item.word}</span>
      <span class="wordbook-item-pos">${item.pos || ''}</span>
      <span class="wordbook-item-summary">${item.summary || ''}</span>
      <button class="wordbook-item-speak" onclick="event.stopPropagation(); speak('${safeWord}')" title="발음">&#128264;</button>
      <button class="wordbook-item-del" onclick="event.stopPropagation(); removeFromWordbook('${safeWord}')" title="삭제">&#10005;</button>
    </div>`;
  }).join('');
}

/* 단어장 상세 보기 */
async function showWordbookDetail(word, itemEl) {
  /* 활성 표시 */
  document.querySelectorAll('.wordbook-item').forEach(el => el.classList.remove('active'));
  if (itemEl) itemEl.classList.add('active');

  const detailEl = document.getElementById('wordbookDetail');
  detailEl.style.display = 'block';

  /* 캐시에서 결과 가져오기 */
  const cached = await getCacheEntry(word);
  if (cached) {
    detailEl.innerHTML = cached;
  } else {
    detailEl.innerHTML = `<div class="loading">${word}의 결과를 불러오는 중...</div>`;
    try {
      await fetchWordResult(word, detailEl);
    } catch {
      detailEl.innerHTML = '<div class="error">결과를 불러올 수 없습니다.</div>';
    }
  }
}

/* 탭 전환 시 단어장 목록 로드 — 기존 switchTab 확장 */
const _origSwitchTab = switchTab;
switchTab = function(tab) {
  _origSwitchTab(tab);
  if (tab === 'wordbook') {
    document.getElementById('wordbookDetail').style.display = 'none';
    renderWordbook();
  }
};
