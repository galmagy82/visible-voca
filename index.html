<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Kongko - Welcome</title>
<style>
  /* 공통 초기화 */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* 전체 화면 배경 */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* 타이틀 */
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    color: #e0e0e0;
    margin-bottom: 36px;
    letter-spacing: 0.15em;
  }

  /* 영상 컨테이너 */
  .video-wrap {
    width: 100%;
    max-width: 640px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #333;
    margin-bottom: 40px;
    background: #000;
  }
  .video-wrap video {
    width: 100%;
    display: block;
  }

  /* 시작하기 버튼 */
  .start-btn {
    padding: 16px 48px;
    font-size: 1.1rem;
    border: none;
    border-radius: 12px;
    background: #2a2a2a;
    color: #ccc;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
  }
  .start-btn:hover { background: #3a3a3a; }
</style>
</head>
<body>

<!-- 앱 타이틀 -->
<h1>STORY KONGKO</h1>

<!-- 홍보 영상 -->
<div class="video-wrap">
  <video controls autoplay muted playsinline>
    <source src="assets/kongko_video.mp4" type="video/mp4">
    <!-- 브라우저가 video 태그를 지원하지 않을 때 표시 -->
    영상을 재생할 수 없습니다.
  </video>
</div>

<!-- 시작하기 버튼 — main.html로 이동 -->
<a class="start-btn" href="main.html">시작하기</a>

</body>
</html>
