<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Geminary 브랜드 아이콘 — index.html 의 hero brand-icon 과 동일 비율·좌표.
       박스(rect rx=14) + 흰 노드 3 + 보조 라인 2. 첫 노드만 불투명, 나머지 0.8 / 0.6. -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B6FA0"/>
      <stop offset="100%" stop-color="#5B9BD5"/>
    </linearGradient>
  </defs>
  <rect width="60" height="60" rx="14" fill="url(#g)"/>
  <line x1="16" y1="16" x2="39" y2="16" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="16" y1="16" x2="23.6" y2="39.7" stroke="white" stroke-width="2" opacity="0.4"/>
  <circle cx="16" cy="16" r="6" fill="white"/>
  <circle cx="44" cy="16" r="5" fill="white" opacity="0.8"/>
  <circle cx="25" cy="44" r="4.5" fill="white" opacity="0.6"/>
