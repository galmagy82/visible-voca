<!DOCTYPE html>
<html lang="ko">
<head>
<!-- 인앱 브라우저 감지 → 외부 브라우저 전환 (vocabulary.html / main.html 동일 패턴) -->
<script>
(function() {
  var ua = navigator.userAgent;
  var isInApp = /KAKAOTALK|Line|FBAN|FBAV|Instagram|NAVER|wv/i.test(ua);
  if (!isInApp) return;
  if (/Android/i.test(ua)) {
    location.href = 'intent://' + location.host + location.pathname + location.search +
      '#Intent;scheme=https;package=com.android.chrome;end';
  } else if (!location.search.includes('openExternalBrowser=1')) {
    location.href = location.href + (location.search ? '&' : '?') + 'openExternalBrowser=1';
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Tutor — Geminary</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
<!-- Supabase JS — 인증 세션 확인용 (vocabulary.html 와 동일 cdn) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- 다국어 -->
<script src="i18n.js?v=20260427a"></script>
<!-- 공용 "내 영어 레벨" 컴포넌트 (모달 + 칩 + 로직 + renderSlider 임베드 헬퍼) -->
<script src="level-picker.js?v=20260426"></script>
<style>
  /* 페이지 제목 (h1.page-heading) 강조용 세리프 폰트 — main.html 의 Geminary 와 같은 톤 */
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F7F6F3;
    color: #2D2B28;
    min-height: 100vh;
    padding: 30px 20px 60px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  /* 1단: 유틸리티 — 메인 복귀(좌) + 내 영어 레벨 칩(우).
     페이지 제목은 별도 헤딩(.page-heading)으로 분리해 시각적 앵커로 사용. */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    min-height: 32px;  /* 칩 미렌더 시점에도 높이 유지 */
  }
  /* 뒤로가기 링크 — 텍스트 앞에 CSS 로 그린 셰브론(< 모양). 유니코드 ← 보다 또렷하고
     hover 시 살짝 왼쪽으로 슬라이드해 "뒤로 간다" 는 마이크로 인터랙션 힌트를 줌.
     주의: ::before transform 에서 translate 가 rotate 보다 앞에 와야 문서 좌표계로
           이동함 (rotate 뒤에 두면 회전된 축으로 이동해서 의도와 다른 방향으로 움직임). */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    color: #6B6660;
    text-decoration: none;
    transition: color 0.15s;
  }
  .back-link::before {
    content: '';
    display: inline-block;
    width: 7px;
    height: 7px;
    border-left: 1.5px solid currentColor;
    border-bottom: 1.5px solid currentColor;
    transform: rotate(45deg);
    transition: transform 0.18s ease, border-color 0.15s;
  }
  .back-link:hover { color: #2D2B28; }
  .back-link:hover::before { transform: translateX(-3px) rotate(45deg); }
  /* 칩(좌) + ⚙️(우) 묶음. 칩이 미렌더 상태일 때도 ⚙️ 위치가 흔들리지 않도록 flex */
  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  /* ⚙️ 설정 진입 버튼 — 칩과 비슷한 톤이지만 좀 더 작게 */
  .settings-gear-btn {
    width: 32px;
    height: 32px;
    padding: 0;
    font-size: 0.95rem;
    line-height: 1;
    border: 1px solid #D5D2CC;
    border-radius: 50%;
    background: #FFFFFF;
    color: #4A4641;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .settings-gear-btn:hover { background: #EDECEA; border-color: #B0ACA6; }
  /* 2단: 페이지 제목 — 큰 헤딩으로 단독 배치.
     Geminary 브랜드(main.html, 40px) 와 같은 DM Serif Display 폰트로 톤 일치,
     사이즈는 한 단계 작게(1.8rem ≈ 29px) 두어 메인 vs 서브 페이지 위계 유지. */
  .page-heading {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: #2A2520;
    text-align: center;
    margin: 0 0 32px;
    letter-spacing: -0.01em;
  }

  /* 업로드 영역 */
  .upload-area {
    text-align: center;
    padding: 60px 20px;
  }
  .upload-btn {
    padding: 14px 24px;
    font-size: 1rem;
    border: 1px dashed #B0ACA6;
    border-radius: 12px;
    background: #FFFFFF;
    color: #6B6660;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .upload-btn:hover { background: #EDECEA; border-color: #9A9590; color: #2D2B28; }
  .upload-hint {
    margin-top: 14px;
    font-size: 0.85rem;
    color: #8A8078;
    /* 두 번째 문장(자동 정렬 안내)을 줄바꿈으로 분리 — i18n 문자열에 \n 포함 */
    white-space: pre-line;
  }

  /* Reading Tutor 첫 화면 소개 — 업로드 영역 안 버튼 위쪽에 표시.
     uploadArea 자체가 업로드 화면에서만 보이므로 추가 노출 조건 불필요. */
  .reading-intro {
    margin-bottom: 28px;
    text-align: center;
  }
  .reading-intro-desc {
    margin: 0 0 16px;
    font-size: 0.95rem;
    line-height: 1.6;
    color: #4A4641;
    /* i18n 문자열의 \n 을 줄바꿈으로 표시 */
    white-space: pre-line;
  }
  /* 예시 이미지 좌·우 2열 — 모바일에서 1열로 스택 */
  .reading-intro-images {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 560px;
    margin: 0 auto;
  }
  .reading-intro-img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    border: 1px solid #E5E2DE;
    background: #FFFFFF;
    display: block;
  }
  @media (max-width: 480px) {
    .reading-intro { margin-bottom: 20px; }
    .reading-intro-desc { font-size: 0.9rem; }
    .reading-intro-images {
      grid-template-columns: 1fr;
      max-width: 320px;
      gap: 10px;
    }
  }

  /* 추출 진행 상태 */
  .loading-area {
    text-align: center;
    padding: 80px 20px;
    color: #6B6660;
  }
  .spinner {
    display: inline-block;
    width: 28px;
    height: 28px;
    border: 3px solid #E5E2DE;
    border-top-color: #5A8A42;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-progress {
    margin-top: 8px;
    font-size: 0.85rem;
    color: #8A8078;
  }

  /* 업로드 영역 보조 진입점 — "📚 My Books" 텍스트 링크.
     업로드(메인 CTA) 와 시각 위계를 분리하기 위해 버튼 박스 대신 작은 텍스트 링크로 표현.
     hover 시 ::after 화살표가 살짝 오른쪽으로 슬라이드 — back-link 의 chevron 과 대칭. */
  .my-books-link {
    display: inline-block;
    margin-top: 40px;
    padding: 8px 6px;
    font-size: 1rem;
    color: #6B6660;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }
  .my-books-link::after {
    content: ' →';
    display: inline-block;
    transition: transform 0.18s ease;
  }
  .my-books-link:hover { color: #2D2B28; }
  .my-books-link:hover::after { transform: translateX(3px); }

  /* 북 뷰어 — 결과 상태 */
  .book-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  /* 좌측 버튼 묶음 (저장된 표시 배지) */
  .toolbar-left, .toolbar-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .translate-toggle {
    padding: 8px 14px;
    font-size: 0.85rem;
    border: 1px solid #D5D2CC;
    border-radius: 10px;
    background: #FFFFFF;
    color: #4A4641;
    cursor: pointer;
    transition: background 0.2s;
  }
  .translate-toggle:hover { background: #EDECEA; }
  .translate-toggle.active { background: #5A8A42; color: #FFFFFF; border-color: #5A8A42; }
  /* 책으로 저장 버튼 — 살짝 강조 */
  .save-book-btn {
    padding: 8px 14px;
    font-size: 0.85rem;
    border: 1px solid #5A8A42;
    border-radius: 10px;
    background: #FFFFFF;
    color: #5A8A42;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .save-book-btn:hover { background: #5A8A42; color: #FFFFFF; }
  .saved-badge {
    font-size: 0.8rem;
    color: #5A8A42;
    background: #EAF1E2;
    border: 1px solid #C9DBB8;
    padding: 4px 10px;
    border-radius: 999px;
  }

  /* 본문 인라인 학습 단어 하이라이트 — 배경 틴트만으로 표시 (밑줄은 줄간 간섭이 있어 제거).
     hover 시 틴트가 진해져 클릭 가능 affordance 를 보강. */
  .study-highlight {
    background: rgba(90, 138, 66, 0.15);
    padding: 0 2px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .study-highlight:hover { background: rgba(90, 138, 66, 0.3); }
  .study-highlight.active {
    background: rgba(90, 138, 66, 0.4);
  }

  /* 페이지 본문 + 하단 학습 리스트 컨테이너
     .page 의 flex(가운데 정렬)와 충돌하지 않도록 column 으로 자체 정렬 */
  .page-content-wrap {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
    max-width: 100%;
    align-items: center;
  }

  /* 학습 단어 collapsible 리스트 */
  .study-list-details {
    width: 100%;
    max-width: 100%;
    border-top: 1px dashed #D5D2CC;
    padding-top: 14px;
    margin-top: 4px;
  }
  .study-list-summary {
    font-size: 0.9rem;
    color: #4A4641;
    cursor: pointer;
    user-select: none;
    list-style: none;
    padding: 4px 0;
  }
  .study-list-summary::before {
    content: '▸';
    display: inline-block;
    margin-right: 6px;
    transition: transform 0.15s;
  }
  .study-list-details[open] .study-list-summary::before {
    transform: rotate(90deg);
  }
  .study-list-ul {
    list-style: none;
    padding: 12px 0 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .study-item-li {
    border-left: 3px solid #5A8A42;
    padding: 6px 0 6px 12px;
  }
  .study-item-li.flash {
    background: rgba(90, 138, 66, 0.25);
    transition: background 0.6s;
  }
  .study-item-surface {
    font-weight: 600;
    color: #2D2B28;
    margin-right: 4px;
  }
  /* 학습 단어 옆 발음 듣기 버튼 — 브라우저 내장 TTS(speak()) 트리거.
     surface 바로 오른쪽에 위치 → "단어 → 발음 → 의미" 시선 흐름. */
  .study-item-speak {
    padding: 2px 4px;
    margin-right: 4px;
    font-size: 0.85rem;
    line-height: 1;
    border: none;
    background: transparent;
    color: #6B6660;
    cursor: pointer;
    vertical-align: middle;
    transition: color 0.15s;
  }
  .study-item-speak:hover { color: #2D2B28; }
  /* 학습 단어 옆 Geminary 검색 버튼 — 단어지도 미니 아이콘.
     클릭 시 vocabulary.html 을 iframe 임베드 모드로 띄워 해당 단어의 검색 결과 표시. */
  .study-item-geminary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    padding: 0;
    margin-left: 4px;
    border: none;
    background: transparent;
    border-radius: 4px;
    cursor: pointer;
    vertical-align: middle;
    transition: background 0.15s;
  }
  .study-item-geminary:hover { background: #EAF2FB; }
  .study-item-type {
    font-size: 0.75rem;
    color: #8A8078;
    background: #F0EEEA;
    padding: 1px 6px;
    border-radius: 4px;
    vertical-align: middle;
  }
  .study-item-meaning {
    margin-top: 4px;
    font-size: 0.92rem;
    color: #4A4641;
  }
  .study-item-example {
    margin-top: 3px;
    font-size: 0.82rem;
    color: #8A8078;
    font-style: italic;
  }

  /* 내 책 목록 화면 — 섹션 헤더는 상단 h1 이 대신 표시 */
  .book-list-area { padding: 8px 0 60px; }
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }
  .book-card {
    position: relative;
    background: #FFFFFF;
    border: 1px solid #D5D2CC;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .book-card:hover {
    border-color: #5A8A42;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .book-card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #2D2B28;
    margin-bottom: 6px;
    word-break: break-word;
    line-height: 1.4;
  }
  .book-card-meta {
    font-size: 0.78rem;
    color: #8A8078;
  }
  .book-card-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #B0ACA6;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    transition: background 0.15s, color 0.15s;
  }
  .book-card-delete:hover { background: #F2D5D5; color: #B85C5C; }
  .book-list-empty {
    padding: 60px 20px;
    text-align: center;
    color: #8A8078;
  }

  /* 책 저장 모달
     주의: .modal-overlay 가 display:flex 를 가지면 [hidden] 속성(기본 display:none)
     이 무시됨 → 같은 선택자에 [hidden] 변형을 추가해 명시적으로 가림. */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45, 43, 40, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-overlay[hidden] { display: none; }
  .modal-card {
    background: #FFFFFF;
    border-radius: 14px;
    max-width: 420px;
    width: 100%;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .modal-title { font-size: 1.05rem; font-weight: 600; color: #2D2B28; margin-bottom: 6px; }
  .modal-desc { font-size: 0.88rem; color: #6B6660; margin-bottom: 16px; }
  .modal-input {
    width: 100%;
    padding: 10px 12px;
    font-size: 0.95rem;
    border: 1px solid #D5D2CC;
    border-radius: 8px;
    background: #FAFAF7;
    color: #2D2B28;
    font-family: inherit;
  }
  .modal-input:focus { outline: none; border-color: #5A8A42; background: #FFFFFF; }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }
  .modal-btn {
    padding: 9px 18px;
    font-size: 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .modal-btn-cancel { background: #FFFFFF; border-color: #D5D2CC; color: #6B6660; }
  .modal-btn-cancel:hover { background: #EDECEA; }
  .modal-btn-primary { background: #5A8A42; color: #FFFFFF; }
  .modal-btn-primary:hover { background: #4A7335; }
  .modal-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 설정 모달 — vocabulary.html 의 my-설정 그룹 스타일을 차용해 통일감 유지 */
  .rs-group-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #2D2B28;
    margin-bottom: 4px;
  }
  .rs-group-gap { margin-top: 20px; }
  .rs-group-hint {
    font-size: 0.78rem;
    color: #8A8078;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  /* 모달 내 슬라이더 호스트 — LevelPicker.renderSlider 가 innerHTML 로 슬라이더 마운트 */
  .rs-slider-host { padding: 4px 0 4px; }
  /* 라디오 그룹 (모국어 / 영어) */
  .rs-radio-group {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .rs-radio {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.92rem;
    color: #4A4641;
    cursor: pointer;
  }
  .rs-radio input[type="radio"] {
    width: 16px;
    height: 16px;
    accent-color: #5A8A42;
    cursor: pointer;
  }

  /* 페이지 슬라이드 컨테이너 — overflow hidden + 좌우 슬라이드 트랜스폼 */
  .book-stage {
    position: relative;
    background: #FFFFFF;
    border: 1px solid #D5D2CC;
    border-radius: 14px;
    overflow: hidden;
    min-height: 320px;
  }
  .page-track {
    display: flex;
    transition: transform 0.35s ease;
    will-change: transform;
  }
  .page {
    flex: 0 0 100%;
    padding: 28px 24px;
    min-height: 320px;
    /* 텍스트를 가로 중앙 정렬 + 자식이 콘텐츠 너비만큼만 차지하도록 flex 사용 */
    display: flex;
    justify-content: center;
  }
  .page-text {
    font-size: 1rem;
    line-height: 1.7;
    color: #2D2B28;
    white-space: pre-wrap;
    word-break: break-word;
    /* pre-wrap + flex child → 가장 긴 줄에 맞춰 박스 너비 자동 결정 (오른쪽 여백 최소화) */
    max-width: 100%;
  }
  .page-error {
    text-align: center;
    color: #8A8078;
    font-size: 0.9rem;
    padding: 60px 20px;
  }

  /* 네비게이션 (페이지 카운터 + 화살표) */
  .nav-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
  }
  .nav-arrow {
    width: 38px;
    height: 38px;
    border: 1px solid #D5D2CC;
    border-radius: 50%;
    background: #FFFFFF;
    color: #4A4641;
    cursor: pointer;
    font-size: 1.1rem;
    transition: background 0.2s;
  }
  .nav-arrow:hover:not(:disabled) { background: #EDECEA; }
  .nav-arrow:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-counter {
    font-size: 0.9rem;
    color: #6B6660;

let _geScore = null;
/* 단어 설명을 어떤 언어로 받을지 — 'native'(UI 언어, 기본) | 'en'(영영 풀이).
   user_profile.meaning_lang 컬럼과 1:1 매핑. extractReadingPage 호출 시 함께 전달. */
let _meaningLang = 'native';
/* 설정 모달이 열려 있는 동안 mount 된 슬라이더 핸들 (renderSlider 반환값).

/* "내 영어 레벨" 칩 + meaning_lang 을 user_profile 에서 한 번에 로드.
   - 칩: 점수 있으면 "내 영어 레벨: 6.5 (중급) ✏️", 없으면 "내 영어 레벨 설정하기"
   - meaning_lang: 'native'(UI 언어) / 'en'(영영) — 단어 추출 시 함께 전달 */
async function loadAndRenderLevelChip() {
  if (!_authUser) return;  // 로컬 개발 비로그인 상태에서는 칩 비활성
  if (typeof window.LevelPicker === 'undefined') return;
  /* LevelPicker.load 는 ge_score 만 반환 → meaning_lang 까지 가져오려면 별도 쿼리.
     RLS 로 본인 행만 보이므로 maybeSingle() 안전. 행이 없으면 둘 다 기본값 유지. */
  const { data, error } = await supabaseClient
    .from('user_profile')
    .select('ge_score, meaning_lang')
    .eq('user_id', _authUser.id)
    .maybeSingle();
  if (error) { console.warn('[reading] profile load failed:', error); }
  _geScore = (data && data.ge_score != null) ? Number(data.ge_score) : null;
  _meaningLang = (data && data.meaning_lang === 'en') ? 'en' : 'native';
  renderLevelChip();
}

function renderLevelChip() {
  const host = document.getElementById('levelChipHost');
  if (!host || typeof window.LevelPicker === 'undefined') return;
  window.LevelPicker.renderChip({
    container: host,
    score: _geScore,

function openLevelModal() {
  if (!_authUser || typeof window.LevelPicker === 'undefined') return;
  window.LevelPicker.openModal({
    supabase: supabaseClient,

}

/* 사진 업로드 직전 GE 게이트.
   - GE 가 이미 있으면 즉시 true
   - 비로그인(로컬 dev) 이면 true (게이트 스킵, 단어 추출 결과는 빈 배열)
   - 미설정이면 모달 호출 → 저장 시 true, 취소 시 false
   결과를 Promise<boolean> 으로 반환해 handlePhotos 에서 gate. */
function ensureGeOrPrompt() {
  if (_geScore != null) return Promise.resolve(true);
  if (!_authUser || typeof window.LevelPicker === 'undefined') return Promise.resolve(true);
  return new Promise((resolve) => {
    window.LevelPicker.openModal({
      supabase: supabaseClient,
      userId: _authUser.id,
      currentScore: _geScore,
      onSave: (newScore) => {
        _geScore = newScore;
        renderLevelChip();
        resolve(true);
      },
      onCancel: () => resolve(false),
    });

}

function getUserId() {
  if (_authUser) return _authUser.id;
  let id = localStorage.getItem('visibleVoca_userId');
  if (!id) {

    localStorage.setItem('visibleVoca_userId', id);
  }

/* --- 다국어 적용: i18n.js 의 글로벌 applyI18n 사용. lang 속성·title 만 보강. --- */

/* --- 이미지 → 리사이즈 + JPEG Base64 (vocabulary.html 패턴 차용) --- */
async function fileToResizedBase64(file, maxDim = 1536, quality = 0.85) {
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = dataUrl;
  });
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  const jpegDataUrl = canvas.toDataURL('image/jpeg', quality);
  return { data: jpegDataUrl.split(',')[1], mimeType: 'image/jpeg' };
}

/* --- Edge Function 호출: 페이지 1장 → {original, translated, no_text, study_items}
   geScore:     사용자 GE 점수 (null 이면 study_items 빈 배열 반환).
   meaningLang: 학습 단어 의미를 어떤 언어로 받을지 — 'native'(targetLang) | 'en'(영영).
   에러에 .status 를 부착해 재시도 로직이 일시적 vs 영구 실패를 구분할 수 있게 함. */
async function extractReadingPage(base64Data, mimeType, targetLang, geScore, meaningLang) {
  const res = await fetch(EDGE_FUNCTION_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'reading-extract',
      userId: getUserId(),
      base64Data, mimeType, targetLang, geScore, meaningLang,
    }),
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    const err = new Error(data.error || `reading-extract API error (${res.status})`);
    err.status = res.status;
    throw err;
  }
  return res.json();
}

/* 일시적 실패(429/5xx/네트워크) 에 대해 지수 백오프로 재시도.
   - 첫 재시도 1s, 두 번째 2.5s — 각 0~30% jitter 로 동시 재시도 충돌 회피
   - 영구 에러(400/401/403/404 등) 는 재시도해도 똑같이 실패하므로 즉시 throw
   - 네트워크 에러는 status 가 없음 → 재시도 대상으로 처리 */
async function extractReadingPageWithRetry(base64Data, mimeType, targetLang, geScore, meaningLang) {
  const delays = [1000, 2500];
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    try {
      return await extractReadingPage(base64Data, mimeType, targetLang, geScore, meaningLang);
    } catch (e) {
      const status = e && e.status;
      const retryable = !status || status === 429 || (status >= 500 && status < 600);
      if (!retryable || attempt === delays.length) throw e;
      const base = delays[attempt];
      const wait = base + Math.random() * base * 0.3;
      console.warn(`[reading-extract] attempt ${attempt + 1} failed (status=${status || 'network'}), retrying in ${Math.round(wait)}ms`);
      await new Promise((r) => setTimeout(r, wait));
    }
  }
}

/* ===== 메인 흐름 상태 ===== */
const MAX_PAGES = 30;
/* 페이지 데이터: { original, translated, no_text, error, study_items: [{surface, type, meaning, example_in_text}] } */
let _pages = [];
let _currentIdx = 0;
let _showTranslated = false;
let _completedCount = 0;
/* "My Books" 화면을 거쳐 책 뷰어에 진입했는지 여부 — 뒤로가기 라벨/목적지 결정 전용.
   true: 뷰어에서 뒤로가기 → "← My Books"
   false: 뷰어에서 뒤로가기 → "← Reading Tutor" (업로드 화면)
   주의: "저장됐냐" 와는 별개 개념. 저장 여부는 _currentBookId !== null 로 판단.
   (예: 새로 올린 책을 저장해도 _isSavedView 는 false 유지 — 사용자는 여전히 새 업로드 세션 중) */
let _isSavedView = false;
/* DB(reading_books) 에 row 가 존재하는지. 저장 직후 또는 저장된 책을 열 때 set.
   저장 버튼/배지 토글의 단일 진실 — 뒤로가기 동선과는 분리. */
let _currentBookId = null;
let _currentBookTitle = '';

/* 업로드 버튼 클릭 진입점.
   파일 피커를 열기 전에 GE 게이트를 통과시켜야 함 — 사용자가 사진 고른 뒤에야
   레벨 모달이 끼어들어 흐름이 끊기는 걸 방지. 취소하면 파일 피커도 안 열림. */
async function onUploadBtnClick() {
  const ok = await ensureGeOrPrompt();
  if (!ok) return;
  document.getElementById('photoInput').click();
}

/* --- 사진 업로드 핸들러 --- */
async function handlePhotos(inputEl) {
  const files = Array.from(inputEl.files);
  if (files.length === 0) return;
  if (files.length > MAX_PAGES) {
    alert((typeof t === 'function') ? t('readingMaxPagesAlert') : `최대 ${MAX_PAGES}페이지까지 업로드 가능합니다.`);
    inputEl.value = '';
    return;
  }

  /* 갤러리에서 다중 선택 시 OS 가 "탭 순서" 로 FileList 를 넘기는데,
     iOS/Android 갤러리는 보통 최신순으로 정렬되어 있어 위에서부터 탭하면
     마지막 페이지가 첫 번째로 들어오는 문제가 있음 → 촬영시각(lastModified)
     오름차순으로 정렬해 실제 페이지 순서를 복원. 모든 파일의 timestamp 가
     동일하면 sort 가 안정 정렬이라 picker 순서가 그대로 유지됨. */
  files.sort((a, b) => (a.lastModified || 0) - (b.lastModified || 0));

  /* GE 게이트 — 미설정 시 모달 호출, 사용자가 취소하면 업로드 중단 */
  const geOk = await ensureGeOrPrompt();
  if (!geOk) {
    inputEl.value = '';
    return;
  }

  const lang = (typeof getLang === 'function') ? getLang() : 'ko';

  /* 상태 전환: 업로드 → 로딩 */
  document.getElementById('uploadArea').hidden = true;
  document.getElementById('bookViewer').hidden = true;
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('loadingArea').hidden = false;
  _completedCount = 0;
  updateLoadingProgress(0, files.length);

  /* 페이지별 병렬 호출 — Promise.allSettled 로 일부 실패 시 격리.
     geScore + meaningLang 을 같이 전달해 단어 추출도 한 번에 처리.
     재시도 헬퍼를 사용해 일시적 장애(429/5xx/네트워크) 는 자동 복구. */
  const tasks = files.map(async (file) => {
    const { data: base64Data, mimeType } = await fileToResizedBase64(file);
    const result = await extractReadingPageWithRetry(base64Data, mimeType, lang, _geScore, _meaningLang);
    _completedCount++;
    updateLoadingProgress(_completedCount, files.length);
    return result;
  });

  const settled = await Promise.allSettled(tasks);

  _pages = settled.map((r) => {
    if (r.status === 'fulfilled') {
      return {
        original: r.value.original || '',
        translated: r.value.translated || '',
        no_text: !!r.value.no_text,
        study_items: filterStudyItems(r.value.study_items),
        error: null,
      };
    }
    console.error('reading-extract 실패:', r.reason);
    return { original: '', translated: '', no_text: false, study_items: [], error: r.reason?.message || 'extract failed' };
  });

  inputEl.value = '';
  _currentIdx = 0;
  _showTranslated = false;
  /* 새로 추출한 책은 미저장 — 저장 버튼 노출, 저장 배지 숨김 */
  _isSavedView = false;
  _currentBookId = null;
  _currentBookTitle = '';

  /* 상태 전환: 로딩 → 북 뷰어 */
  document.getElementById('loadingArea').hidden = true;
  document.getElementById('bookViewer').hidden = false;
  renderBook();
  updateBookViewerToolbar();
  updateTopBackLink();
}

/* 북 뷰어 툴바: 저장 여부에 따라 저장 버튼·배지 토글.
   판정 기준은 _currentBookId — DB 에 행이 있으면 저장된 것 (책 목록 경유 여부와 무관). */
function updateBookViewerToolbar() {
  const saveBtn = document.getElementById('saveBookBtn');
  const savedBadge = document.getElementById('savedBadge');
  if (!saveBtn || !savedBadge) return;
  const persisted = _currentBookId != null;
  if (persisted) {
    saveBtn.hidden = true;
    savedBadge.hidden = false;
  } else {
    /* 비로그인(로컬 dev) 상태에서는 저장 불가 — 버튼도 숨김 */
    saveBtn.hidden = !_authUser;
    savedBadge.hidden = true;
  }
}

/* 상단 뒤로가기 링크 라벨/동작 + 페이지 제목(h1) 을 현재 화면 상태에 맞춰 갱신.
   - 업로드 화면: h1 "Reading Tutor" / 뒤로가기 "← 메인화면" → main.html
   - 책 목록: h1 "📚 My Books" / 뒤로가기 "← Reading Tutor" → 업로드 화면
   - 책 뷰어 (제목 있음): h1 = 책 제목 / 뒤로가기는 _isSavedView 에 따라
   - 책 뷰어 (제목 없음, 새 업로드 미저장): h1 "Reading Tutor" / "← Reading Tutor" → 업로드
   화면 전환이 일어나는 모든 함수 끝에서 호출. */
function updateTopBackLink() {
  const link = document.getElementById('topBackLink');
  const heading = document.getElementById('readingPageHeading');
  if (!link) return;
  const tt = (k, fb) => (typeof t === 'function') ? t(k) : fb;

  const bookListVisible = !document.getElementById('bookListArea').hidden;
  const bookViewerVisible = !document.getElementById('bookViewer').hidden;

  /* 페이지 제목 — 화면별 분기:
     - 책 목록: "📚 My Books"
     - 책 뷰어 + 제목 있음: 사용자 데이터(책 제목) 표시 — data-i18n 제거해서 언어 전환에 덮어쓰기 방지
     - 그 외 (업로드/로딩/제목 없는 새 책): "Reading Tutor" */
  if (heading) {
    if (bookListVisible) {
      heading.setAttribute('data-i18n', 'readingMyBooks');
      heading.textContent = tt('readingMyBooks', '📚 My Books');
    } else if (bookViewerVisible && _currentBookTitle) {
      heading.removeAttribute('data-i18n');
      heading.textContent = _currentBookTitle;
    } else {
      heading.setAttribute('data-i18n', 'menuReadingTitle');
      heading.textContent = tt('menuReadingTitle', 'Reading Tutor');
    }
  }

  /* 폴백 문자열에는 화살표 미포함 — 셰브론은 .back-link::before 가 그려줌 */
  if (bookListVisible) {
    link.href = '#';
    link.setAttribute('data-i18n', 'readingBackToReadingTutor');
    link.textContent = tt('readingBackToReadingTutor', 'Reading Tutor');
    link.onclick = (e) => { e.preventDefault(); backToUpload(); };
  } else if (bookViewerVisible && _isSavedView) {
    link.href = '#';
    link.setAttribute('data-i18n', 'readingBackToBookList');
    link.textContent = tt('readingBackToBookList', 'My Books');
    link.onclick = (e) => { e.preventDefault(); showBookList(); };
  } else if (bookViewerVisible) {
    link.href = '#';
    link.setAttribute('data-i18n', 'readingBackToReadingTutor');
    link.textContent = tt('readingBackToReadingTutor', 'Reading Tutor');
    link.onclick = (e) => { e.preventDefault(); resetReading(); };
  } else {
    /* 업로드 화면(또는 로딩 중) — 메인으로 직행 */
    link.href = 'main.html';
    link.setAttribute('data-i18n', 'readingBackToMain');
    link.textContent = tt('readingBackToMain', '메인화면');
    link.onclick = null;
  }

  /* 내 영어 레벨 칩 + ⚙️ 설정 — 업로드 화면(=Reading Tutor 진입 상태)에서만 노출.
     이유: 둘 다 "다음에 추출할 책의 레벨/언어 설정" 도구라 이미 추출 끝난 책을 볼 때
     (My Books 목록 / 책 뷰어) 노출하면 "여기서 바꾸면 결과가 바뀌나?" 헷갈림만 만든다.
     ⚙️ 는 인증된 유저에게만 노출되는 추가 조건도 같이 충족시켜야 함. */
  const onUploadScreen = !bookListVisible && !bookViewerVisible;
  const chipHost = document.getElementById('levelChipHost');
  const settingsBtn = document.getElementById('readingSettingsBtn');
  if (chipHost) chipHost.hidden = !onUploadScreen;
  if (settingsBtn) settingsBtn.hidden = !(onUploadScreen && _authUser);
}

function updateLoadingProgress(done, total) {
  document.getElementById('loadingProgress').textContent = `${done} / ${total}`;
}

/* --- 북 뷰어 렌더 --- */
function renderBook() {
  const track = document.getElementById('pageTrack');
  track.innerHTML = _pages.map((p, i) => `<div class="page" data-page-idx="${i}">${renderPageContent(p, i)}</div>`).join('');
  goTo(_currentIdx, /*animate*/ false);
  updateNav();
  updateTranslateBtnState();
}

function renderPageContent(p, pageIdx) {
  if (p.error) {
    return `<div class="page-error" data-i18n="readingPageError">${escapeHtml((typeof t === 'function') ? t('readingPageError') : '이 페이지의 텍스트를 추출하지 못했습니다.')}</div>`;
  }
  if (p.no_text) {
    return `<div class="page-error" data-i18n="readingNoText">${escapeHtml((typeof t === 'function') ? t('readingNoText') : '이 페이지에는 글자가 없습니다.')}</div>`;
  }
  const showT = _showTranslated && p.translated;
  const text = showT ? p.translated : p.original;
  const items = Array.isArray(p.study_items) ? p.study_items : [];
  /* 번역 모드에서는 surface 가 영어 원문 substring 이므로 하이라이트 매칭 불가 → 평문 표시.
     원문 모드에서만 하이라이트 적용. */
  const html = (!showT && items.length > 0)
    ? highlightText(text, items, pageIdx)
    : escapeHtml(text);

  /* 학습 단어 collapsible 리스트 (페이지 내 공급된 항목만) */
  const listHtml = items.length > 0
    ? renderStudyList(items, pageIdx)
    : '';

  return `<div class="page-content-wrap">
    <div class="page-text">${html}</div>
    ${listHtml}
  </div>`;
}

/* 페이지 경계 분할 fragment 제거 — 책에서 단어가 페이지를 넘기며 "grum-" / "bled" 로 쪼개지면
   Gemini 가 앞쪽 조각("grum-")을 학습어로 뽑는 경우가 있음. surface 끝 하이픈으로 식별해서 컷.
   _pages 에 저장되기 전에 적용 → 하이라이트·학습어 리스트·DB 저장 모두 깨끗해짐. */
function filterStudyItems(items) {
  if (!Array.isArray(items)) return [];
  return items.filter((it) => {
    if (!it || typeof it.surface !== 'string') return false;
    return !it.surface.trim().endsWith('-');
  });
}

/* 본문에서 학습 단어 surface 를 case-insensitive 로 찾아 <span class="study-highlight"> 로 감쌈.
   - 더 긴 surface 부터 매칭 (idiom 이 단어 매칭에 먹히지 않도록)
   - 알파벳/숫자 경계에서만 매칭 (단어 중간에 걸려 잘못 잡히는 것 방지)
   - 위치 기반 occupied 배열로 중복 매칭 방지 → 최종 출력은 left-to-right 단일 패스로 안전하게 조립
   - surface 안의 공백은 \s+ 로 컴파일 → OCR 줄바꿈 ("cuddle\nup with") / 연속 공백도 매칭됨 */
function highlightText(rawText, studyItems, pageIdx) {
  const sorted = studyItems
    .map((item, idx) => ({ item, idx }))
    .filter((x) => x.item && typeof x.item.surface === 'string' && x.item.surface.trim().length > 0)
    .sort((a, b) => b.item.surface.length - a.item.surface.length);

  const occupied = new Array(rawText.length).fill(false);
  const matches = [];
  const isWord = (ch) => /[A-Za-z0-9]/.test(ch);
  /* 정규식 메타문자 이스케이프 — surface 에 들어올 수 있는 ., (, ?, $, * 등 보호 */
  const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

  for (const { item, idx } of sorted) {
    const surface = item.surface.trim();
    /* surface → 정규식 패턴:
       - 단어 사이는 \s+ (다단어구의 줄바꿈 매칭, ex. "cuddle up\nwith")
       - 단어 내부 글자 사이는 (?:-?\n\s{0,3})? — 책 인쇄/OCR 의 줄 끝 단어 분할 케이스만 커버:
         · "mum\nbled"   (순수 줄바꿈)
         · "mum-\nbled"  (하이픈 + 줄바꿈)
         · 다음 줄 들여쓰기 공백 0~3개까지 허용
         · \n 을 반드시 포함시켜 문단 안의 일반 공백/하이픈 합성어 오매칭 방지 */
    const MID_WORD_BREAK = '(?:-?\\n\\s{0,3})?';
    const pattern = surface
      .split(/\s+/)
      .map((word) => word.split('').map(escapeRegex).join(MID_WORD_BREAK))
      .join('\\s+');
    let re;
    try {
      re = new RegExp(pattern, 'gi');
    } catch (_e) {
      continue;
    }
    const startsWord = isWord(surface[0]);
    const endsWord = isWord(surface[surface.length - 1]);
    let m;
    while ((m = re.exec(rawText)) !== null) {
      if (m[0].length === 0) { re.lastIndex++; continue; }
      const start = m.index;
      const end = start + m[0].length;
      /* 단어 경계 검사: surface 끝 글자가 알파벳/숫자일 때만 인접 글자도 비-단어여야 함.
         (구두점·idiom 끝 글자 등은 경계 검사 면제 — 기존 동작과 동일) */
      const startOk = !startsWord || start === 0 || !isWord(rawText[start - 1]);
      const endOk = !endsWord || end === rawText.length || !isWord(rawText[end]);
      let overlap = false;
      for (let i = start; i < end; i++) { if (occupied[i]) { overlap = true; break; } }
      if (startOk && endOk && !overlap) {
        for (let i = start; i < end; i++) occupied[i] = true;
        matches.push({ start, end, idx });
      }
    }
  }

  matches.sort((a, b) => a.start - b.start);

  let out = '';
  let cursor = 0;
  for (const m of matches) {
    out += escapeHtml(rawText.slice(cursor, m.start));
    out += `<span class="study-highlight" data-page-idx="${pageIdx}" data-item-idx="${m.idx}" onclick="scrollToStudyItem(${pageIdx}, ${m.idx})">${escapeHtml(rawText.slice(m.start, m.end))}</span>`;
    cursor = m.end;
  }
  out += escapeHtml(rawText.slice(cursor));
  return out;
}

/* 학습 단어 리스트 (페이지 하단 collapsible). open 기본값으로 펼침. */
function renderStudyList(items, pageIdx) {
  const titleTpl = (typeof t === 'function') ? t('readingStudyItemsTitle') : '이 페이지의 학습 단어 ({n})';
  const title = titleTpl.replace('{n}', items.length);
  /* 본문 예문(example_in_text) 은 의도적으로 표시하지 않음 — 페이지 본문에 이미 같은 문장이
     하이라이트까지 된 채로 보이므로 카드에 또 띄우면 중복. 데이터는 jsonb 에 보관되지만 화면에는 안 씀. */
  /* surface 옆 Geminary 미니 아이콘 버튼 — 클릭 시 openGeminaryPopup() 가 vocabulary 임베드를 띄움.
     단어는 data-word 속성으로 전달 (위임 핸들러가 dataset.word 로 읽음). */
  const speakLabel = (typeof t === 'function') ? t('listenPronunciation') : '발음 듣기';
  const safeSpeakLabel = escapeHtml(speakLabel);
  const lis = items.map((it, i) => {
    const safeSurface = escapeHtml(it.surface || '');
    return `
    <li class="study-item-li" id="study-item-${pageIdx}-${i}">
      <div>
        <span class="study-item-surface">${safeSurface}</span>
        <button class="study-item-speak" type="button" data-word="${safeSurface}" title="${safeSpeakLabel}" aria-label="${safeSpeakLabel}">&#128264;</button>
        <span class="study-item-type">${escapeHtml(formatStudyType(it.type))}</span>
        <button class="study-item-geminary" type="button" data-word="${safeSurface}" aria-label="Geminary">
          <svg width="14" height="12" viewBox="0 0 28 24" xmlns="http://www.w3.org/2000/svg">
            <line x1="6" y1="6" x2="15" y2="6" stroke="#4A90D9" stroke-width="1.5" opacity="0.5"/>
            <line x1="6" y1="6" x2="9.3" y2="15.2" stroke="#4A90D9" stroke-width="1.5" opacity="0.5"/>
            <circle cx="6" cy="6" r="3" fill="#4A90D9"/>
            <circle cx="18" cy="6" r="3" fill="#5B9BD5"/>
            <circle cx="10" cy="18" r="3" fill="#7BB3E0"/>
          </svg>
        </button>
      </div>
      <div class="study-item-meaning">${escapeHtml(it.meaning || '')}</div>
    </li>`;
  }).join('');
  return `<details class="study-list-details" open>
    <summary class="study-list-summary">${escapeHtml(title)}</summary>
    <ul class="study-list-ul">${lis}</ul>
  </details>`;
}

/* 학습 단어 타입을 보기 좋게 (원문 그대로 보여줘도 무방하지만 phrasal_verb → phrasal verb 등 정리) */
function formatStudyType(typ) {
  if (!typ) return '';
  return String(typ).replace(/_/g, ' ');
}

/* 본문 하이라이트 클릭 → 해당 페이지 학습 단어 항목으로 부드럽게 스크롤 + 짧게 강조 */
function scrollToStudyItem(pageIdx, itemIdx) {
  const el = document.getElementById(`study-item-${pageIdx}-${itemIdx}`);
  if (!el) return;
  /* details 가 닫혀있으면 펼침 */
  const details = el.closest('details');
  if (details && !details.open) details.open = true;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.add('flash');
  /* 1.2s 동안 진한 배경 유지 후 transition(0.6s) 으로 부드럽게 페이드아웃 */
  setTimeout(() => el.classList.remove('flash'), 1200);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* --- 네비게이션 --- */
function goTo(idx, animate = true) {
  _currentIdx = Math.max(0, Math.min(_pages.length - 1, idx));
  const track = document.getElementById('pageTrack');
  if (!animate) {
    track.style.transition = 'none';
    requestAnimationFrame(() => { track.style.transition = ''; });
  }
  track.style.transform = `translateX(-${_currentIdx * 100}%)`;
  updateNav();
}
function goPrev() { if (_currentIdx > 0) goTo(_currentIdx - 1); }
function goNext() { if (_currentIdx < _pages.length - 1) goTo(_currentIdx + 1); }

function updateNav() {
  document.getElementById('prevBtn').disabled = _currentIdx === 0;
  document.getElementById('nextBtn').disabled = _currentIdx >= _pages.length - 1;
  document.getElementById('pageCounter').textContent = `${_currentIdx + 1} / ${_pages.length}`;
}

/* --- 번역 토글 (전체 페이지 일괄) --- */
function toggleTranslate() {
  _showTranslated = !_showTranslated;
  /* 모든 페이지를 다시 렌더 (현재 위치 유지) */
  const track = document.getElementById('pageTrack');
  track.innerHTML = _pages.map((p, i) => `<div class="page" data-page-idx="${i}">${renderPageContent(p, i)}</div>`).join('');
  goTo(_currentIdx, false);
  updateTranslateBtnState();
}
function updateTranslateBtnState() {
  const btn = document.getElementById('translateToggle');
  if (btn.style.display === 'none') return;
  btn.classList.toggle('active', _showTranslated);
  btn.textContent = _showTranslated
    ? ((typeof t === 'function') ? t('readingShowOriginal') : '원문')
    : ((typeof t === 'function') ? t('readingTranslate') : '번역');
}

/* --- 새로 올리기 (세션 초기화) --- */
function resetReading() {
  _pages = [];
  _currentIdx = 0;
  _showTranslated = false;
  _isSavedView = false;
  _currentBookId = null;
  _currentBookTitle = '';
  document.getElementById('bookViewer').hidden = true;
  document.getElementById('loadingArea').hidden = true;
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('uploadArea').hidden = false;
  updateTopBackLink();
}

/* 책 목록(또는 책 뷰어 fresh 모드) 에서 뒤로가기 → 업로드 화면으로 복귀.
   책 뷰어도 같이 숨겨야 fresh 뷰어에서 호출되었을 때 화면이 정상 전환됨. */
function backToUpload() {
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('bookViewer').hidden = true;
  document.getElementById('loadingArea').hidden = true;
  document.getElementById('uploadArea').hidden = false;
  updateTopBackLink();
}

/* ===== 내 책 (저장된 reading_books) ===== */

/* "📚 내 책" 버튼 → 책 목록 화면으로 전환 + 데이터 로드 */
async function showBookList() {
  if (!_authUser) return;
  document.getElementById('uploadArea').hidden = true;
  document.getElementById('bookViewer').hidden = true;
  document.getElementById('loadingArea').hidden = true;
  document.getElementById('bookListArea').hidden = false;
  updateTopBackLink();
  const content = document.getElementById('bookListContent');
  content.innerHTML = `<div class="book-list-empty">${escapeHtml((typeof t === 'function') ? t('readingLoadingBooks') : '책 목록을 불러오는 중...')}</div>`;
  try {
    const books = await loadBookList();
    renderBookList(books);
  } catch (e) {
    console.error('book list load 실패:', e);
    content.innerHTML = `<div class="book-list-empty">${escapeHtml(e?.message || 'load failed')}</div>`;
  }
}

async function loadBookList() {
  /* 본인 행만 조회 (RLS) — 최신순 */
  const { data, error } = await supabaseClient
    .from('reading_books')
    .select('id, title, pages, created_at')
    .eq('user_id', _authUser.id)
    .order('created_at', { ascending: false });
  if (error) throw error;
  return data || [];
}

function renderBookList(books) {
  const content = document.getElementById('bookListContent');
  if (!books || books.length === 0) {
    content.innerHTML = `<div class="book-list-empty">${escapeHtml((typeof t === 'function') ? t('readingMyBooksEmpty') : '아직 저장한 책이 없어요')}</div>`;
    return;
  }
  const pagesTpl = (typeof t === 'function') ? t('readingBookCardPages') : '{n}페이지';
  const cards = books.map((b) => {
    const pageCount = Array.isArray(b.pages) ? b.pages.length : 0;
    const pagesText = pagesTpl.replace('{n}', pageCount);
    const dateText = b.created_at ? new Date(b.created_at).toLocaleDateString() : '';
    return `<div class="book-card" onclick="openSavedBook('${b.id}')">
      <button class="book-card-delete" onclick="event.stopPropagation(); deleteBook('${b.id}')" aria-label="delete">×</button>
      <div class="book-card-title">${escapeHtml(b.title || '')}</div>
      <div class="book-card-meta">${escapeHtml(pagesText)} · ${escapeHtml(dateText)}</div>
    </div>`;
  }).join('');
  content.innerHTML = `<div class="book-grid">${cards}</div>`;
}

/* 저장된 책 카드 클릭 → 해당 책 페이지 데이터를 로드해 북 뷰어로 표시 */
async function openSavedBook(bookId) {
  if (!_authUser) return;
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('loadingArea').hidden = false;
  try {
    const { data, error } = await supabaseClient
      .from('reading_books')
      .select('id, title, pages')
      .eq('id', bookId)
      .single();
    if (error) throw error;
    _pages = Array.isArray(data.pages) ? data.pages.map((p) => ({
      original: p.original || '',
      translated: p.translated || '',
      no_text: !!p.no_text,
      study_items: filterStudyItems(p.study_items),
      error: null,
    })) : [];
    _currentIdx = 0;
    _showTranslated = false;
    _isSavedView = true;
    _currentBookId = data.id;
    _currentBookTitle = data.title || '';

    document.getElementById('loadingArea').hidden = true;
    document.getElementById('bookViewer').hidden = false;
    renderBook();
    updateBookViewerToolbar();
    updateTopBackLink();
  } catch (e) {
    console.error('open saved book 실패:', e);
    alert(e?.message || 'load failed');
    document.getElementById('loadingArea').hidden = true;
    showBookList();
  }
}

async function deleteBook(bookId) {
  const msg = (typeof t === 'function') ? t('readingDeleteBookConfirm') : '이 책을 삭제하시겠습니까?';
  if (!confirm(msg)) return;
  try {
    const { error } = await supabaseClient
      .from('reading_books')
      .delete()
      .eq('id', bookId);
    if (error) throw error;
    /* 목록 다시 로드 */
    await showBookList();
  } catch (e) {
    console.error('delete book 실패:', e);
    alert((typeof t === 'function') ? t('readingDeleteError') : '책 삭제에 실패했어요');
  }
}

/* ===== 책으로 저장 (모달) ===== */

function openSaveBookModal() {
  const modal = document.getElementById('saveBookModal');
  const input = document.getElementById('saveBookTitleInput');
  input.value = _currentBookTitle || '';
  modal.hidden = false;
  setTimeout(() => input.focus(), 0);
}

function closeSaveBookModal() {
  document.getElementById('saveBookModal').hidden = true;
}

async function saveCurrentBook() {
  if (!_authUser) return;
  const input = document.getElementById('saveBookTitleInput');
  const title = (input.value || '').trim();
  if (!title) {
    input.focus();
    return;
  }
  const btn = document.getElementById('saveBookConfirmBtn');
  btn.disabled = true;
  try {
    /* 페이지 jsonb: 표시·하이라이트에 필요한 필드만 저장 (error 는 제외) */
    const pagesPayload = _pages.map((p) => ({
      original: p.original || '',
      translated: p.translated || '',
      no_text: !!p.no_text,
      study_items: Array.isArray(p.study_items) ? p.study_items : [],
    }));
    const { data, error } = await supabaseClient
      .from('reading_books')
      .insert({
        user_id: _authUser.id,
        title,
        pages: pagesPayload,
      })
      .select('id')
      .single();
    if (error) throw error;
    /* 저장 후: _currentBookId 만 set 해서 "이미 저장됨(=배지)" 상태로 토글.
       _isSavedView 는 false 유지 — 사용자는 책 목록을 거치지 않았으므로 뒤로가기는
       여전히 "← Reading Tutor" 가 맞음. */
    _currentBookId = data.id;
    _currentBookTitle = title;
    closeSaveBookModal();
    updateBookViewerToolbar();
    /* 저장 직후 상단 h1 을 "Reading Tutor" → 방금 입력한 책 제목으로 즉시 반영 */
    updateTopBackLink();
  } catch (e) {
    console.error('save book 실패:', e);
    alert((typeof t === 'function') ? t('readingSaveError') : '책 저장에 실패했어요');
  } finally {
    btn.disabled = false;
  }
}

/* ===== Reading 설정 모달 ===== */

/* ⚙️ 클릭 → 모달 열기. 슬라이더는 LevelPicker.renderSlider 로 매번 마운트
   (이전 핸들이 있으면 destroy 해서 resize 리스너 누수 방지). 라디오는 _meaningLang 으로 체크. */
function openReadingSettings() {
  if (!_authUser) return;
  if (typeof window.LevelPicker === 'undefined') return;
  const modal = document.getElementById('readingSettingsModal');
  /* 슬라이더 호스트 — 이전에 열어둔 핸들이 있으면 정리 */
  if (_rsSliderHandle && typeof _rsSliderHandle.destroy === 'function') {
    _rsSliderHandle.destroy();
    _rsSliderHandle = null;
  }
  const host = document.getElementById('readingSettingsSliderHost');
  _rsSliderHandle = window.LevelPicker.renderSlider({
    container: host,
    initialValue: _geScore,  // null 이면 helper 가 5.0 기본값 사용
    id: 'reading-settings',
  });
  /* 라디오 체크 — 현재 _meaningLang 에 맞춰 */
  const radios = document.querySelectorAll('input[name="rsMeaningLang"]');
  radios.forEach((r) => { r.checked = (r.value === _meaningLang); });
  modal.hidden = false;
}

/* 모달 닫기 — 슬라이더 destroy 까지 책임짐 */
function closeReadingSettings() {
  document.getElementById('readingSettingsModal').hidden = true;
  if (_rsSliderHandle && typeof _rsSliderHandle.destroy === 'function') {
    _rsSliderHandle.destroy();
    _rsSliderHandle = null;
  }
}

/* 저장: ge_score + meaning_lang 을 user_profile 에 한 번에 upsert.
   - 슬라이더에서 GE 값 읽고, 라디오에서 meaning_lang 읽음
   - 성공 시 캐시 갱신 + 칩 재렌더 + 모달 닫기 */
async function saveReadingSettings() {
  if (!_authUser) return;
  const btn = document.getElementById('readingSettingsSaveBtn');
  /* 슬라이더 값 — 핸들 없으면 안전하게 기존값 유지 */
  const ge = _rsSliderHandle ? _rsSliderHandle.getValue() : _geScore;
  /* 라디오 — 체크된 값 (없으면 'native') */
  const checked = document.querySelector('input[name="rsMeaningLang"]:checked');
  const ml = (checked && checked.value === 'en') ? 'en' : 'native';

  btn.disabled = true;
  try {
    const nowIso = new Date().toISOString();
    const row = {
      user_id: _authUser.id,
      ge_score: ge,
      ge_updated_at: nowIso,
      meaning_lang: ml,
      updated_at: nowIso,
    };
    const { error } = await supabaseClient
      .from('user_profile')
      .upsert(row, { onConflict: 'user_id' });
    if (error) throw error;
    /* 성공 → 캐시 갱신 + UI 갱신 */
    _geScore = (ge != null) ? Number(ge) : null;
    _meaningLang = ml;
    renderLevelChip();
    closeReadingSettings();
  } catch (e) {
    console.error('reading settings save 실패:', e);
    alert(e?.message || 'save failed');
  } finally {
    btn.disabled = false;
  }
}

/* --- 모바일 스와이프 (좌/우 페이지 넘김) --- */
let _touchStartX = 0;
let _touchEndX = 0;
document.addEventListener('DOMContentLoaded', () => {
  const stage = document.querySelector('.book-stage');
  if (!stage) return;
  stage.addEventListener('touchstart', (e) => {
    _touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });
  stage.addEventListener('touchend', (e) => {
    _touchEndX = e.changedTouches[0].screenX;
    const dx = _touchEndX - _touchStartX;
    if (Math.abs(dx) < 40) return;
    if (dx > 0) goPrev(); else goNext();
  }, { passive: true });
});

/* 키보드 좌/우 화살표로도 넘기기. Esc 로 열려있는 모달 닫기. */
document.addEventListener('keydown', (e) => {
  /* 저장 모달이 열려 있으면 페이지 네비게이션 무시. Esc 로 닫기, Enter 로 저장. */
  const saveModal = document.getElementById('saveBookModal');
  if (saveModal && !saveModal.hidden) {
    if (e.key === 'Escape') { closeSaveBookModal(); return; }
    if (e.key === 'Enter') { e.preventDefault(); saveCurrentBook(); return; }
    return;
  }
  /* 설정 모달이 열려 있으면 페이지 네비게이션 무시. Esc 로 닫기. (Enter 저장은 라디오 포커스
     중 의도치 않게 발동될 수 있어 일부러 안 묶음) */
  const settingsModal = document.getElementById('readingSettingsModal');
  if (settingsModal && !settingsModal.hidden) {
    if (e.key === 'Escape') { closeReadingSettings(); return; }
    return;
  }
  /* 입력 폼에 포커스가 있으면 페이지 네비게이션 무시 */
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (document.getElementById('bookViewer').hidden) return;
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
});

/* 모달 빈 배경 클릭 → 닫기 (lp-overlay 와 동일 UX). 카드 안 클릭은 stopPropagation 없이도
   target 비교로 무시되므로 안전. */
document.addEventListener('click', (e) => {
  const settingsModal = document.getElementById('readingSettingsModal');
  if (settingsModal && !settingsModal.hidden && e.target === settingsModal) {
    closeReadingSettings();
  }
});

/* === 학습 단어 → Geminary 검색결과 팝업 ===
   학습단어 옆 미니 아이콘(.study-item-geminary) 클릭 → vocabulary.html?q=WORD&embed=1 을
   iframe 으로 띄움. 위임 핸들러로 한 번 등록 (study list 가 페이지마다 동적으로 렌더되므로). */
function openGeminaryPopup(word) {
  if (!word) return;
  const overlay = document.getElementById('wordPopupOverlay');
  const iframe = document.getElementById('wordPopupIframe');
  iframe.src = `vocabulary.html?q=${encodeURIComponent(word)}&embed=1`;
  overlay.hidden = false;
  /* 본문 스크롤 잠금 — 팝업 뒤 페이지가 같이 스크롤되는 어색함 방지 */
  document.body.style.overflow = 'hidden';
}
function closeGeminaryPopup() {
  const overlay = document.getElementById('wordPopupOverlay');
  const iframe = document.getElementById('wordPopupIframe');
  /* iframe src 비워서 안에서 돌던 검색·이미지 생성 즉시 중단 + 다음 열기 시 깜빡임 방지 */
  iframe.src = 'about:blank';
  overlay.hidden = true;
  document.body.style.overflow = '';
}
/* 발음 듣기 — 브라우저 내장 SpeechSynthesis (vocabulary.html 의 speak() 와 동일 시그니처).
   책 본문 단어는 영어이므로 lang='en-US' 고정. 추가 API 비용 0, 오프라인 동작. */
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

/* 위임 클릭 핸들러 — 미니 아이콘 어디서 클릭해도(SVG 자식 포함) 작동 */
document.addEventListener('click', (e) => {
  const speakBtn = e.target.closest('.study-item-speak');
  if (speakBtn) {
    speak(speakBtn.dataset.word);
    return;
  }
  const btn = e.target.closest('.study-item-geminary');
  if (btn) {
    openGeminaryPopup(btn.dataset.word);
    return;
  }
  /* 팝업 빈 배경 클릭 → 닫기 (오버레이 자체가 target 일 때만) */
  const overlay = document.getElementById('wordPopupOverlay');
  if (overlay && !overlay.hidden && e.target === overlay) {
    closeGeminaryPopup();
  }
});
/* iframe(vocabulary.html embed-mode) 내부 ✕ 버튼이 postMessage 로 닫기 요청 → 부모에서 닫음 */
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'close-word-popup') closeGeminaryPopup();
});
/* ESC 키로도 팝업 닫기 — 키보드 사용자 편의 */
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  const overlay = document.getElementById('wordPopupOverlay');
  if (overlay && !overlay.hidden) closeGeminaryPopup();
});

/* 시작 */
initAuth();
</script>
