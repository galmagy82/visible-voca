<script>
(function() {
  var ua = navigator.userAgent;
  var isInApp = /KAKAOTALK|Line|FBAN|FBAV|Instagram|NAVER|wv/i.test(ua);
  if (!isInApp) return;
  if (/Android/i.test(ua)) {
    location.href = 'intent://' + location.host + location.pathname + location.search +
      '#Intent;scheme=https;package=com.android.chrome;end';
  } else if (!location.search.includes('openExternalBrowser=1')) {
    location.href = location.href + (location.search ? '&' : '?') + 'openExternalBrowser=1';
  }
})();
</script>

<style>

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F7F6F3;

    min-height: 100vh;
    padding: 30px 20px 60px;
  }
  .container {
    max-width: 720px;

  }

  /* 1단: 유틸리티 — 메인 복귀(좌) + 내 영어 레벨 칩(우).

    align-items: center;

    font-weight: 600;

    text-align: center;
    margin: 0 0 32px;
    letter-spacing: -0.01em;
  }

  /* 업로드 영역 */
  .upload-area {
    text-align: center;
    padding: 60px 20px;
  }
  .upload-btn {
    padding: 14px 24px;
    font-size: 1rem;
    border: 1px dashed #B0ACA6;
    border-radius: 12px;
    background: #FFFFFF;
    color: #6B6660;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .upload-btn:hover { background: #EDECEA; border-color: #9A9590; color: #2D2B28; }
  .upload-hint {
    margin-top: 14px;

  /* 책 저장 모달

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45, 43, 40, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;

  .modal-card {
    background: #FFFFFF;
    border-radius: 14px;

    width: 100%;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);

  .modal-title { font-size: 1.05rem; font-weight: 600; color: #2D2B28; margin-bottom: 6px; }
  .modal-desc { font-size: 0.88rem; color: #6B6660; margin-bottom: 16px; }
  .modal-input {
    width: 100%;
    padding: 10px 12px;
    font-size: 0.95rem;
    border: 1px solid #D5D2CC;
    border-radius: 8px;
    background: #FAFAF7;
    color: #2D2B28;
    font-family: inherit;
  }
  .modal-input:focus { outline: none; border-color: #5A8A42; background: #FFFFFF; }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }
  .modal-btn {
    padding: 9px 18px;
    font-size: 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .modal-btn-cancel { background: #FFFFFF; border-color: #D5D2CC; color: #6B6660; }
  .modal-btn-cancel:hover { background: #EDECEA; }
  .modal-btn-primary { background: #5A8A42; color: #FFFFFF; }
  .modal-btn-primary:hover { background: #4A7335; }
  .modal-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 페이지 슬라이드 컨테이너 — overflow hidden + 좌우 슬라이드 트랜스폼 */
  .book-stage {
    position: relative;
    background: #FFFFFF;
    border: 1px solid #D5D2CC;
    border-radius: 14px;
    overflow: hidden;
    min-height: 320px;
  }
  .page-track {
    display: flex;
    transition: transform 0.35s ease;
    will-change: transform;
  }
  .page {
    flex: 0 0 100%;
    padding: 28px 24px;
    min-height: 320px;
    /* 텍스트를 가로 중앙 정렬 + 자식이 콘텐츠 너비만큼만 차지하도록 flex 사용 */
    display: flex;
    justify-content: center;
  }
  .page-text {
    font-size: 1rem;
    line-height: 1.7;
    color: #2D2B28;
    white-space: pre-wrap;
    word-break: break-word;

    max-width: 100%;
  }
  .page-error {
    text-align: center;
    color: #8A8078;
    font-size: 0.9rem;
    padding: 60px 20px;
  }

  /* 네비게이션 (페이지 카운터 + 화살표) */
  .nav-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
  }
  .nav-arrow {
    width: 38px;
    height: 38px;
    border: 1px solid #D5D2CC;
    border-radius: 50%;
    background: #FFFFFF;

    font-size: 1.1rem;

  .nav-arrow:hover:not(:disabled) { background: #EDECEA; }
  .nav-arrow:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-counter {
    font-size: 0.9rem;
    color: #6B6660;
    min-width: 60px;
    text-align: center;
  }

  @media (max-width: 480px) {
    .page { padding: 22px 18px; }
    .page-text { font-size: 0.95rem; }
    .page-heading { font-size: 1.35rem; margin-bottom: 24px; }
  }
</style>

<div class="container">

  <!-- 1단: 유틸리티 (뒤로가기 + 내 영어 레벨 칩) -->

<script>
/* ===== Reading Tutor ===== */

/* --- Supabase 초기화 (vocabulary.html 와 동일 키) --- */
const SUPABASE_URL = 'https://grdtxvpebjtfhuqdngfn.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ca5H8oz6gJ72mfgUW8zYvg_U6IVwooW';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const EDGE_FUNCTION_URL = 'https://grdtxvpebjtfhuqdngfn.supabase.co/functions/v1/gemini-proxy';

/* 로컬 개발 환경에서는 인증 강제 안 함 */
const isLocalDev = ['localhost', '127.0.0.1', ''].includes(location.hostname)
                || location.protocol === 'file:';

let _authUser = null;
/* 현재 사용자의 GE 점수 캐시 — 헤더 칩 + (향후) 단어 추출에서 사용. null = 미설정/미조회 */
let _geScore = null;

async function initAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  _authUser = session?.user || null;
  if (!_authUser && !isLocalDev) {
    location.href = 'index.html';
    return;
  }
  document.body.style.display = '';
  applyI18nForReading();
  setupTranslateToggle();
  /* 로그인 후 GE 점수 로드 + 헤더 칩 렌더 (로컬 개발에서는 user 없으면 스킵) */
  await loadAndRenderLevelChip();
  /* 인증된 유저에게만 "내 책" 진입 버튼 노출 (저장 기능은 RLS 로 user_id 매칭 필요) */
  if (_authUser) {
    document.getElementById('myBooksBtn').hidden = false;
  }
}

/* "내 영어 레벨" 칩을 헤더에 그립니다.
   - 점수가 있으면 "내 영어 레벨: 6.5 (중급) ✏️"
   - 없으면 "내 영어 레벨 설정하기"
   - 둘 다 클릭 시 모달이 열리고, 저장하면 칩이 갱신됨 */
async function loadAndRenderLevelChip() {
  if (!_authUser) return;  // 로컬 개발 비로그인 상태에서는 칩 비활성
  if (typeof window.LevelPicker === 'undefined') return;

  renderLevelChip();
}

function renderLevelChip() {
  const host = document.getElementById('levelChipHost');
  if (!host || typeof window.LevelPicker === 'undefined') return;
  window.LevelPicker.renderChip({
    container: host,
    score: _geScore,
    onClick: openLevelModal,

}

function openLevelModal() {
  if (!_authUser || typeof window.LevelPicker === 'undefined') return;
  window.LevelPicker.openModal({
    supabase: supabaseClient,
    userId: _authUser.id,
    currentScore: _geScore,
    onSave: (newScore) => {

/* 사진 업로드 직전 GE 게이트.
   - GE 가 이미 있으면 즉시 true
   - 비로그인(로컬 dev) 이면 true (게이트 스킵, 단어 추출 결과는 빈 배열)
   - 미설정이면 모달 호출 → 저장 시 true, 취소 시 false
   결과를 Promise<boolean> 으로 반환해 handlePhotos 에서 gate. */
function ensureGeOrPrompt() {
  if (_geScore != null) return Promise.resolve(true);
  if (!_authUser || typeof window.LevelPicker === 'undefined') return Promise.resolve(true);
  return new Promise((resolve) => {
    window.LevelPicker.openModal({
      supabase: supabaseClient,
      userId: _authUser.id,
      currentScore: _geScore,
      onSave: (newScore) => {
        _geScore = newScore;
        renderLevelChip();
        resolve(true);
      },
      onCancel: () => resolve(false),
    });
  });
}

function getUserId() {
  if (_authUser) return _authUser.id;
  let id = localStorage.getItem('visibleVoca_userId');
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem('visibleVoca_userId', id);
  }
  return id;
}

/* --- 다국어 적용: i18n.js 의 글로벌 applyI18n 사용. lang 속성·title 만 보강. --- */

/* --- 이미지 → 리사이즈 + JPEG Base64 (vocabulary.html 패턴 차용) --- */
async function fileToResizedBase64(file, maxDim = 1536, quality = 0.85) {
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = dataUrl;
  });
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  const jpegDataUrl = canvas.toDataURL('image/jpeg', quality);
  return { data: jpegDataUrl.split(',')[1], mimeType: 'image/jpeg' };
}

/* --- Edge Function 호출: 페이지 1장 → {original, translated, no_text, study_items}
   geScore: 사용자 GE 점수 (null 이면 study_items 빈 배열 반환). */
async function extractReadingPage(base64Data, mimeType, targetLang, geScore) {
  const res = await fetch(EDGE_FUNCTION_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'reading-extract',
      userId: getUserId(),
      base64Data, mimeType, targetLang, geScore,
    }),
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || 'reading-extract API error');
  }
  return res.json();
}

/* ===== 메인 흐름 상태 ===== */
const MAX_PAGES = 30;
/* 페이지 데이터: { original, translated, no_text, error, study_items: [{surface, type, meaning, example_in_text}] } */
let _pages = [];
let _currentIdx = 0;
let _showTranslated = false;
let _completedCount = 0;
/* 저장된 책 보기 모드. true 면 "책으로 저장" 버튼 숨기고 "저장된 책" 배지 표시 */
let _isSavedView = false;
let _currentBookId = null;
let _currentBookTitle = '';

/* --- 사진 업로드 핸들러 --- */
async function handlePhotos(inputEl) {
  const files = Array.from(inputEl.files);
  if (files.length === 0) return;
  if (files.length > MAX_PAGES) {
    alert((typeof t === 'function') ? t('readingMaxPagesAlert') : `최대 ${MAX_PAGES}페이지까지 업로드 가능합니다.`);
    inputEl.value = '';
    return;
  }

  /* GE 게이트 — 미설정 시 모달 호출, 사용자가 취소하면 업로드 중단 */
  const geOk = await ensureGeOrPrompt();
  if (!geOk) {
    inputEl.value = '';
    return;
  }

  const lang = (typeof getLang === 'function') ? getLang() : 'ko';

  /* 상태 전환: 업로드 → 로딩 */
  document.getElementById('uploadArea').hidden = true;
  document.getElementById('bookViewer').hidden = true;
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('loadingArea').hidden = false;
  _completedCount = 0;
  updateLoadingProgress(0, files.length);

  /* 페이지별 병렬 호출 — Promise.allSettled 로 일부 실패 시 격리.
     geScore 를 같이 전달해 단어 추출도 한 번에 처리. */
  const tasks = files.map(async (file) => {
    const { data: base64Data, mimeType } = await fileToResizedBase64(file);
    const result = await extractReadingPage(base64Data, mimeType, lang, _geScore);
    _completedCount++;
    updateLoadingProgress(_completedCount, files.length);
    return result;
  });

  const settled = await Promise.allSettled(tasks);

  _pages = settled.map((r) => {
    if (r.status === 'fulfilled') {
      return {
        original: r.value.original || '',
        translated: r.value.translated || '',
        no_text: !!r.value.no_text,
        study_items: Array.isArray(r.value.study_items) ? r.value.study_items : [],
        error: null,
      };
    }
    console.error('reading-extract 실패:', r.reason);
    return { original: '', translated: '', no_text: false, study_items: [], error: r.reason?.message || 'extract failed' };
  });

  inputEl.value = '';
  _currentIdx = 0;
  _showTranslated = false;
  /* 새로 추출한 책은 미저장 — 저장 버튼 노출, 저장 배지 숨김 */
  _isSavedView = false;
  _currentBookId = null;
  _currentBookTitle = '';

  /* 상태 전환: 로딩 → 북 뷰어 */
  document.getElementById('loadingArea').hidden = true;
  document.getElementById('bookViewer').hidden = false;
  renderBook();
  updateBookViewerToolbar();
}

/* 북 뷰어 툴바: 저장 모드/신규 모드에 따라 저장 버튼·배지 토글 */
function updateBookViewerToolbar() {
  const saveBtn = document.getElementById('saveBookBtn');
  const savedBadge = document.getElementById('savedBadge');
  if (!saveBtn || !savedBadge) return;
  if (_isSavedView) {
    saveBtn.hidden = true;
    savedBadge.hidden = false;
  } else {
    /* 비로그인(로컬 dev) 상태에서는 저장 불가 — 버튼도 숨김 */
    saveBtn.hidden = !_authUser;
    savedBadge.hidden = true;
  }
}

function updateLoadingProgress(done, total) {
  document.getElementById('loadingProgress').textContent = `${done} / ${total}`;
}

/* --- 북 뷰어 렌더 --- */
function renderBook() {
  const track = document.getElementById('pageTrack');
  track.innerHTML = _pages.map((p, i) => `<div class="page" data-page-idx="${i}">${renderPageContent(p, i)}</div>`).join('');
  goTo(_currentIdx, /*animate*/ false);
  updateNav();
  updateTranslateBtnState();
}

function renderPageContent(p, pageIdx) {
  if (p.error) {
    return `<div class="page-error" data-i18n="readingPageError">${escapeHtml((typeof t === 'function') ? t('readingPageError') : '이 페이지의 텍스트를 추출하지 못했습니다.')}</div>`;
  }
  if (p.no_text) {
    return `<div class="page-error" data-i18n="readingNoText">${escapeHtml((typeof t === 'function') ? t('readingNoText') : '이 페이지에는 글자가 없습니다.')}</div>`;
  }
  const showT = _showTranslated && p.translated;
  const text = showT ? p.translated : p.original;
  const items = Array.isArray(p.study_items) ? p.study_items : [];
  /* 번역 모드에서는 surface 가 영어 원문 substring 이므로 하이라이트 매칭 불가 → 평문 표시.
     원문 모드에서만 하이라이트 적용. */
  const html = (!showT && items.length > 0)
    ? highlightText(text, items, pageIdx)
    : escapeHtml(text);

  /* 학습 단어 collapsible 리스트 (페이지 내 공급된 항목만) */
  const listHtml = items.length > 0
    ? renderStudyList(items, pageIdx)
    : '';

  return `<div class="page-content-wrap">
    <div class="page-text">${html}</div>
    ${listHtml}
  </div>`;
}

/* 본문에서 학습 단어 surface 를 case-insensitive 로 찾아 <span class="study-highlight"> 로 감쌈.
   - 더 긴 surface 부터 매칭 (idiom 이 단어 매칭에 먹히지 않도록)
   - 알파벳/숫자 경계에서만 매칭 (단어 중간에 걸려 잘못 잡히는 것 방지)
   - 위치 기반 occupied 배열로 중복 매칭 방지 → 최종 출력은 left-to-right 단일 패스로 안전하게 조립 */
function highlightText(rawText, studyItems, pageIdx) {
  const sorted = studyItems
    .map((item, idx) => ({ item, idx }))
    .filter((x) => x.item && typeof x.item.surface === 'string' && x.item.surface.length > 0)
    .sort((a, b) => b.item.surface.length - a.item.surface.length);

  const occupied = new Array(rawText.length).fill(false);
  const matches = [];
  const lowerText = rawText.toLowerCase();
  const isWord = (ch) => /[A-Za-z0-9]/.test(ch);

  for (const { item, idx } of sorted) {
    const surface = item.surface;
    const lowerSurface = surface.toLowerCase();
    let pos = 0;
    while (pos < rawText.length) {
      const found = lowerText.indexOf(lowerSurface, pos);
      if (found === -1) break;
      const endIdx = found + surface.length;
      /* 단어 경계: surface 양 끝이 알파벳/숫자일 때만 인접 문자도 비-알파벳/숫자여야 함 */
      const startOk = !isWord(surface[0]) || found === 0 || !isWord(rawText[found - 1]);
      const endOk = !isWord(surface[surface.length - 1]) || endIdx === rawText.length || !isWord(rawText[endIdx]);
      let overlap = false;
      for (let i = found; i < endIdx; i++) { if (occupied[i]) { overlap = true; break; } }
      if (startOk && endOk && !overlap) {
        for (let i = found; i < endIdx; i++) occupied[i] = true;
        matches.push({ start: found, end: endIdx, idx });
        pos = endIdx;
      } else {
        pos = found + 1;
      }
    }
  }

  matches.sort((a, b) => a.start - b.start);

  let out = '';
  let cursor = 0;
  for (const m of matches) {
    out += escapeHtml(rawText.slice(cursor, m.start));
    out += `<span class="study-highlight" data-page-idx="${pageIdx}" data-item-idx="${m.idx}" onclick="scrollToStudyItem(${pageIdx}, ${m.idx})">${escapeHtml(rawText.slice(m.start, m.end))}</span>`;
    cursor = m.end;
  }
  out += escapeHtml(rawText.slice(cursor));
  return out;
}

/* 학습 단어 리스트 (페이지 하단 collapsible). open 기본값으로 펼침. */
function renderStudyList(items, pageIdx) {
  const titleTpl = (typeof t === 'function') ? t('readingStudyItemsTitle') : '이 페이지의 학습 단어 ({n})';
  const title = titleTpl.replace('{n}', items.length);
  /* 본문 예문(example_in_text) 은 의도적으로 표시하지 않음 — 페이지 본문에 이미 같은 문장이
     하이라이트까지 된 채로 보이므로 카드에 또 띄우면 중복. 데이터는 jsonb 에 보관되지만 화면에는 안 씀. */
  const lis = items.map((it, i) => `
    <li class="study-item-li" id="study-item-${pageIdx}-${i}">
      <div>
        <span class="study-item-surface">${escapeHtml(it.surface || '')}</span>
        <span class="study-item-type">${escapeHtml(formatStudyType(it.type))}</span>
      </div>
      <div class="study-item-meaning">${escapeHtml(it.meaning || '')}</div>
    </li>`).join('');
  return `<details class="study-list-details" open>
    <summary class="study-list-summary">${escapeHtml(title)}</summary>
    <ul class="study-list-ul">${lis}</ul>
  </details>`;
}

/* 학습 단어 타입을 보기 좋게 (원문 그대로 보여줘도 무방하지만 phrasal_verb → phrasal verb 등 정리) */
function formatStudyType(typ) {
  if (!typ) return '';
  return String(typ).replace(/_/g, ' ');
}

/* 본문 하이라이트 클릭 → 해당 페이지 학습 단어 항목으로 부드럽게 스크롤 + 짧게 강조 */
function scrollToStudyItem(pageIdx, itemIdx) {
  const el = document.getElementById(`study-item-${pageIdx}-${itemIdx}`);
  if (!el) return;
  /* details 가 닫혀있으면 펼침 */
  const details = el.closest('details');
  if (details && !details.open) details.open = true;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 600);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* --- 네비게이션 --- */
function goTo(idx, animate = true) {
  _currentIdx = Math.max(0, Math.min(_pages.length - 1, idx));
  const track = document.getElementById('pageTrack');
  if (!animate) {
    track.style.transition = 'none';
    requestAnimationFrame(() => { track.style.transition = ''; });
  }
  track.style.transform = `translateX(-${_currentIdx * 100}%)`;
  updateNav();
}
function goPrev() { if (_currentIdx > 0) goTo(_currentIdx - 1); }
function goNext() { if (_currentIdx < _pages.length - 1) goTo(_currentIdx + 1); }

function updateNav() {
  document.getElementById('prevBtn').disabled = _currentIdx === 0;
  document.getElementById('nextBtn').disabled = _currentIdx >= _pages.length - 1;
  document.getElementById('pageCounter').textContent = `${_currentIdx + 1} / ${_pages.length}`;
}

/* --- 번역 토글 (전체 페이지 일괄) --- */
function toggleTranslate() {
  _showTranslated = !_showTranslated;
  /* 모든 페이지를 다시 렌더 (현재 위치 유지) */
  const track = document.getElementById('pageTrack');
  track.innerHTML = _pages.map((p, i) => `<div class="page" data-page-idx="${i}">${renderPageContent(p, i)}</div>`).join('');
  goTo(_currentIdx, false);
  updateTranslateBtnState();
}
function updateTranslateBtnState() {
  const btn = document.getElementById('translateToggle');
  if (btn.style.display === 'none') return;
  btn.classList.toggle('active', _showTranslated);
  btn.textContent = _showTranslated
    ? ((typeof t === 'function') ? t('readingShowOriginal') : '원문')
    : ((typeof t === 'function') ? t('readingTranslate') : '번역');
}

/* --- 새로 올리기 (세션 초기화) --- */
function resetReading() {
  _pages = [];
  _currentIdx = 0;
  _showTranslated = false;
  _isSavedView = false;
  _currentBookId = null;
  _currentBookTitle = '';
  document.getElementById('bookViewer').hidden = true;
  document.getElementById('loadingArea').hidden = true;
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('uploadArea').hidden = false;
}

/* 책 목록에서 "새 책 올리기" → 업로드 화면으로 복귀 */
function backToUpload() {
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('uploadArea').hidden = false;
}

/* ===== 내 책 (저장된 reading_books) ===== */

/* "📚 내 책" 버튼 → 책 목록 화면으로 전환 + 데이터 로드 */
async function showBookList() {
  if (!_authUser) return;
  document.getElementById('uploadArea').hidden = true;
  document.getElementById('bookViewer').hidden = true;
  document.getElementById('loadingArea').hidden = true;
  document.getElementById('bookListArea').hidden = false;
  const content = document.getElementById('bookListContent');
  content.innerHTML = `<div class="book-list-empty">${escapeHtml((typeof t === 'function') ? t('readingLoadingBooks') : '책 목록을 불러오는 중...')}</div>`;
  try {
    const books = await loadBookList();
    renderBookList(books);
  } catch (e) {
    console.error('book list load 실패:', e);
    content.innerHTML = `<div class="book-list-empty">${escapeHtml(e?.message || 'load failed')}</div>`;
  }
}

async function loadBookList() {
  /* 본인 행만 조회 (RLS) — 최신순 */
  const { data, error } = await supabaseClient
    .from('reading_books')
    .select('id, title, pages, created_at')
    .eq('user_id', _authUser.id)
    .order('created_at', { ascending: false });
  if (error) throw error;
  return data || [];
}

function renderBookList(books) {
  const content = document.getElementById('bookListContent');
  if (!books || books.length === 0) {
    content.innerHTML = `<div class="book-list-empty">${escapeHtml((typeof t === 'function') ? t('readingMyBooksEmpty') : '아직 저장한 책이 없어요')}</div>`;
    return;
  }
  const pagesTpl = (typeof t === 'function') ? t('readingBookCardPages') : '{n}페이지';
  const cards = books.map((b) => {
    const pageCount = Array.isArray(b.pages) ? b.pages.length : 0;
    const pagesText = pagesTpl.replace('{n}', pageCount);
    const dateText = b.created_at ? new Date(b.created_at).toLocaleDateString() : '';
    return `<div class="book-card" onclick="openSavedBook('${b.id}')">
      <button class="book-card-delete" onclick="event.stopPropagation(); deleteBook('${b.id}')" aria-label="delete">×</button>
      <div class="book-card-title">${escapeHtml(b.title || '')}</div>
      <div class="book-card-meta">${escapeHtml(pagesText)} · ${escapeHtml(dateText)}</div>
    </div>`;
  }).join('');
  content.innerHTML = `<div class="book-grid">${cards}</div>`;
}

/* 저장된 책 카드 클릭 → 해당 책 페이지 데이터를 로드해 북 뷰어로 표시 */
async function openSavedBook(bookId) {
  if (!_authUser) return;
  document.getElementById('bookListArea').hidden = true;
  document.getElementById('loadingArea').hidden = false;
  try {
    const { data, error } = await supabaseClient
      .from('reading_books')
      .select('id, title, pages')
      .eq('id', bookId)
      .single();
    if (error) throw error;
    _pages = Array.isArray(data.pages) ? data.pages.map((p) => ({
      original: p.original || '',
      translated: p.translated || '',
      no_text: !!p.no_text,
      study_items: Array.isArray(p.study_items) ? p.study_items : [],
      error: null,
    })) : [];
    _currentIdx = 0;
    _showTranslated = false;
    _isSavedView = true;
    _currentBookId = data.id;
    _currentBookTitle = data.title || '';

    document.getElementById('loadingArea').hidden = true;
    document.getElementById('bookViewer').hidden = false;
    renderBook();
    updateBookViewerToolbar();
  } catch (e) {
    console.error('open saved book 실패:', e);
    alert(e?.message || 'load failed');
    document.getElementById('loadingArea').hidden = true;
    showBookList();
  }
}

async function deleteBook(bookId) {
  const msg = (typeof t === 'function') ? t('readingDeleteBookConfirm') : '이 책을 삭제하시겠습니까?';
  if (!confirm(msg)) return;
  try {
    const { error } = await supabaseClient
      .from('reading_books')
      .delete()
      .eq('id', bookId);
    if (error) throw error;
    /* 목록 다시 로드 */
    await showBookList();
  } catch (e) {
    console.error('delete book 실패:', e);
    alert((typeof t === 'function') ? t('readingDeleteError') : '책 삭제에 실패했어요');
  }
}

/* ===== 책으로 저장 (모달) ===== */

function openSaveBookModal() {
  const modal = document.getElementById('saveBookModal');
  const input = document.getElementById('saveBookTitleInput');
  input.value = _currentBookTitle || '';
  modal.hidden = false;
  setTimeout(() => input.focus(), 0);
}

function closeSaveBookModal() {
  document.getElementById('saveBookModal').hidden = true;
}

async function saveCurrentBook() {
  if (!_authUser) return;
  const input = document.getElementById('saveBookTitleInput');
  const title = (input.value || '').trim();
  if (!title) {
    input.focus();
    return;
  }
  const btn = document.getElementById('saveBookConfirmBtn');
  btn.disabled = true;
  try {
    /* 페이지 jsonb: 표시·하이라이트에 필요한 필드만 저장 (error 는 제외) */
    const pagesPayload = _pages.map((p) => ({
      original: p.original || '',
      translated: p.translated || '',
      no_text: !!p.no_text,
      study_items: Array.isArray(p.study_items) ? p.study_items : [],
    }));
    const { data, error } = await supabaseClient
      .from('reading_books')
      .insert({
        user_id: _authUser.id,
        title,
        pages: pagesPayload,
      })
      .select('id')
      .single();
    if (error) throw error;
    /* 저장 후 → 저장 모드로 전환 (배지 표시, 저장 버튼 숨김) */
    _isSavedView = true;
    _currentBookId = data.id;
    _currentBookTitle = title;
    closeSaveBookModal();
    updateBookViewerToolbar();
  } catch (e) {
    console.error('save book 실패:', e);
    alert((typeof t === 'function') ? t('readingSaveError') : '책 저장에 실패했어요');
  } finally {
    btn.disabled = false;
  }
}

/* --- 모바일 스와이프 (좌/우 페이지 넘김) --- */
let _touchStartX = 0;
let _touchEndX = 0;
document.addEventListener('DOMContentLoaded', () => {
  const stage = document.querySelector('.book-stage');
  if (!stage) return;
  stage.addEventListener('touchstart', (e) => {
    _touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });
  stage.addEventListener('touchend', (e) => {
    _touchEndX = e.changedTouches[0].screenX;
    const dx = _touchEndX - _touchStartX;
    if (Math.abs(dx) < 40) return;
    if (dx > 0) goPrev(); else goNext();
  }, { passive: true });
});

/* 키보드 좌/우 화살표로도 넘기기. Esc 로 저장 모달 닫기. */
document.addEventListener('keydown', (e) => {
  /* 저장 모달이 열려 있으면 페이지 네비게이션 무시. Esc 로 닫기, Enter 로 저장. */
  const modal = document.getElementById('saveBookModal');
  if (modal && !modal.hidden) {
    if (e.key === 'Escape') { closeSaveBookModal(); return; }
    if (e.key === 'Enter') { e.preventDefault(); saveCurrentBook(); return; }
    return;
  }
  /* 입력 폼에 포커스가 있으면 페이지 네비게이션 무시 */
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (document.getElementById('bookViewer').hidden) return;
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
});

/* 시작 */
initAuth();
</script>
